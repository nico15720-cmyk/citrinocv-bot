<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#7C2D12">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Agenda">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="apple-touch-icon" href="icon.svg">
  <title>Agenda — Citrino</title>

  <style>
    /* ── LOGIN SCREEN ────────────────────────── */
    #login-screen {
      position: fixed;
      inset: 0;
      background: linear-gradient(160deg, #7C2D12, #B5541A);
      z-index: 9999;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 32px;
      padding-top: calc(40px + env(safe-area-inset-top, 0px));
    }

    #login-screen.hidden { display: none; }

    .login-logo {
      width: 72px; height: 72px;
      background: rgba(255,255,255,.15);
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 34px;
      margin-bottom: 18px;
    }

    .login-title {
      font-size: 22px;
      font-weight: 600;
      color: #fff;
      margin-bottom: 4px;
    }

    .login-sub {
      font-size: 14px;
      color: rgba(255,255,255,.7);
      margin-bottom: 32px;
      text-align: center;
    }

    .login-box {
      width: 100%;
      max-width: 320px;
      background: #fff;
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 20px 60px rgba(0,0,0,.25);
    }

    .login-label {
      font-size: 11px;
      font-weight: 600;
      color: #666;
      text-transform: uppercase;
      letter-spacing: .06em;
      margin-bottom: 6px;
      display: block;
    }

    #login-pass {
      width: 100%;
      padding: 13px 14px;
      border: 1.5px solid #ddd;
      border-radius: 10px;
      font-size: 18px;
      letter-spacing: .12em;
      outline: none;
      margin-bottom: 14px;
      font-family: inherit;
      color: #1a1a1a;
    }
    #login-pass:focus { border-color: #B5541A; }

    #login-err {
      font-size: 12px;
      color: #DC2626;
      margin-bottom: 10px;
      min-height: 16px;
      text-align: center;
    }

    #btn-login {
      width: 100%;
      padding: 13px;
      background: #B5541A;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity .15s;
    }
    #btn-login:active { opacity: .85; }
    #btn-login:disabled { opacity: .55; }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    :root {
      --brand-dark: #7C2D12;
      --brand-mid: #B5541A;
      --brand-light: #EA580C;
      --brand-bg: #FFF8F3;
      --text-p: #1a1a1a;
      --text-s: #666;
      --text-t: #999;
      --border: rgba(0,0,0,0.08);
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    html, body {
      height: 100%;
      background: var(--brand-bg);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      -webkit-font-smoothing: antialiased;
      overscroll-behavior: none;
    }

    /* ── TOP BAR ─────────────────────────────── */
    #topbar {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      background: linear-gradient(150deg, #7C2D12 0%, #B5541A 100%);
      padding-top: calc(var(--safe-top) + 8px);
    }

    .tb-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 14px 8px;
    }

    .tb-left { display: flex; align-items: center; gap: 7px; }

    .tb-title {
      font-size: 16px;
      font-weight: 500;
      color: #fff;
    }

    #badge-count {
      font-size: 11px;
      background: rgba(255,255,255,.25);
      color: #fff;
      padding: 2px 8px;
      border-radius: 20px;
      display: none;
    }

    .tb-actions { display: flex; gap: 6px; }

    .icon-btn {
      width: 32px; height: 32px;
      border-radius: 50%;
      background: rgba(255,255,255,.2);
      border: none;
      color: #fff;
      font-size: 15px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background .15s;
    }
    .icon-btn:active { background: rgba(255,255,255,.35); }

    /* ── WEEK STRIP ─────────────────────────── */
    #weekstrip { padding: 2px 10px 10px; }

    .wk-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 4px;
    }

    .wk-nav button {
      background: none;
      border: none;
      color: rgba(255,255,255,.85);
      font-size: 22px;
      cursor: pointer;
      padding: 2px 10px;
      line-height: 1;
    }

    #wk-label {
      font-size: 12px;
      color: rgba(255,255,255,.85);
      font-weight: 500;
    }

    #days-row {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 1px;
    }

    .day-cell {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 3px 1px 4px;
      border-radius: 10px;
      cursor: pointer;
      user-select: none;
      -webkit-user-select: none;
    }
    .day-cell:active { opacity: .7; }

    .d-name {
      font-size: 9px;
      color: rgba(255,255,255,.7);
      text-transform: uppercase;
      letter-spacing: .04em;
      font-weight: 500;
    }

    .d-num {
      font-size: 18px;
      font-weight: 400;
      color: #fff;
      width: 30px; height: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      margin: 1px 0;
    }

    .day-cell.hoy .d-num {
      background: #fff;
      color: var(--brand-dark);
      font-weight: 700;
    }

    .day-cell.sel:not(.hoy) .d-num {
      background: rgba(255,255,255,.28);
    }

    .d-dot {
      width: 4px; height: 4px;
      border-radius: 50%;
      background: rgba(255,255,255,.75);
      visibility: hidden;
    }
    .d-dot.vis { visibility: visible; }

    /* ── FILTRO PANEL ──────────────────────── */
    #filtro-panel {
      position: fixed;
      left: 0; right: 0;
      z-index: 95;
      background: #fff5ef;
      border-bottom: 1px solid var(--border);
      padding: 10px 14px;
      display: none;
    }
    #filtro-panel.open { display: block; }

    .filtro-title {
      font-size: 10px;
      font-weight: 600;
      color: var(--brand-mid);
      text-transform: uppercase;
      letter-spacing: .06em;
      margin-bottom: 7px;
    }

    #filtro-badges { display: flex; gap: 7px; flex-wrap: wrap; }

    .ter-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 5px 12px;
      border-radius: 20px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 500;
      border: 1.5px solid;
      transition: all .2s;
      user-select: none;
    }
    .ter-dot { width: 8px; height: 8px; border-radius: 50%; }

    /* ── DAY HEADER ────────────────────────── */
    #day-header {
      position: fixed;
      left: 0; right: 0;
      z-index: 90;
      background: var(--brand-bg);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 9px 14px;
    }

    #day-header-text {
      font-size: 13px;
      font-weight: 500;
      color: var(--text-p);
    }

    #day-header-count {
      font-size: 11px;
      color: var(--text-s);
      background: rgba(0,0,0,.05);
      padding: 2px 9px;
      border-radius: 12px;
    }

    /* ── CONTENT / TIME GRID ───────────────── */
    #content {
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding-bottom: calc(80px + var(--safe-bottom));
    }

    #grid { padding: 0 10px; }

    .hr-row {
      display: flex;
      gap: 8px;
      min-height: 58px;
    }

    .hr-lbl {
      width: 38px;
      flex-shrink: 0;
      font-size: 10px;
      color: var(--text-t);
      text-align: right;
      transform: translateY(-6px);
      padding-top: 2px;
    }

    .hr-slot {
      flex: 1;
      border-top: .5px solid var(--border);
      padding: 3px 0;
      cursor: pointer;
    }

    .hr-slot:hover .empty-hint { opacity: 1 !important; }

    .empty-hint {
      font-size: 11px;
      color: var(--text-t);
      opacity: 0;
      transition: opacity .2s;
      padding: 4px 0;
      display: block;
    }

    /* ── APPOINTMENT CARD ──────────────────── */
    .appt {
      border-left: 3px solid;
      border-radius: 8px;
      padding: 7px 10px;
      margin: 0 6px 4px 0;
      cursor: pointer;
      border-top: .5px solid var(--border);
      border-right: .5px solid var(--border);
      border-bottom: .5px solid var(--border);
      transition: opacity .15s;
    }
    .appt:active { opacity: .8; }

    .appt-time {
      font-size: 10px;
      font-weight: 600;
      margin-bottom: 2px;
    }

    .appt-name {
      font-size: 13px;
      font-weight: 500;
      color: var(--text-p);
    }

    .appt-service {
      font-size: 11px;
      color: var(--text-s);
      margin-top: 1px;
    }

    .appt-chips {
      display: flex;
      gap: 4px;
      margin-top: 5px;
      flex-wrap: wrap;
      align-items: center;
    }

    .chip {
      font-size: 10px;
      padding: 1px 7px;
      border-radius: 20px;
      font-weight: 500;
    }

    .appt-actions {
      display: flex;
      gap: 5px;
      margin-top: 7px;
      padding-top: 7px;
      border-top: .5px solid var(--border);
    }

    .act-btn {
      flex: 1;
      padding: 6px 4px;
      border: none;
      border-radius: 6px;
      font-size: 11px;
      font-weight: 500;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 3px;
    }
    .act-btn:active { opacity: .75; }

    /* ── FAB ───────────────────────────────── */
    #fab {
      position: fixed;
      bottom: calc(18px + var(--safe-bottom));
      right: 18px;
      width: 52px; height: 52px;
      border-radius: 50%;
      background: var(--brand-mid);
      border: none;
      color: #fff;
      font-size: 28px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 16px rgba(181,84,26,.45);
      z-index: 200;
      transition: transform .2s;
    }
    #fab:active { transform: scale(.92); }

    /* ── SHEET (bottom drawer) ─────────────── */
    #overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.4);
      z-index: 300;
      opacity: 0;
      pointer-events: none;
      transition: opacity .3s;
    }
    #overlay.open { opacity: 1; pointer-events: auto; }

    .sheet {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: #fff;
      border-radius: 20px 20px 0 0;
      z-index: 310;
      transform: translateY(100%);
      transition: transform .35s cubic-bezier(.4,0,.2,1);
      padding-bottom: calc(14px + var(--safe-bottom));
      max-height: 92vh;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }
    .sheet.open { transform: translateY(0); }

    .sheet-handle {
      width: 36px; height: 4px;
      background: #ddd;
      border-radius: 2px;
      margin: 10px auto 14px;
    }

    .sheet-hdr {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px 12px;
    }

    .sheet-title {
      font-size: 15px;
      font-weight: 600;
      color: var(--text-p);
    }

    .sheet-close {
      width: 28px; height: 28px;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: none;
      cursor: pointer;
      font-size: 13px;
      color: var(--text-s);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .sheet-close:active { background: #f0f0f0; }

    .sheet-body { padding: 0 16px; }

    /* ── FORM ──────────────────────────────── */
    .f-lbl {
      font-size: 11px;
      font-weight: 500;
      color: var(--text-s);
      text-transform: uppercase;
      letter-spacing: .05em;
      margin-bottom: 4px;
      display: block;
    }

    .f-grp { margin-bottom: 12px; }

    input, select {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 16px; /* evita zoom en iOS */
      color: var(--text-p);
      background: #fff;
      outline: none;
      font-family: inherit;
      -webkit-appearance: none;
    }
    input:focus, select:focus { border-color: var(--brand-mid); }

    .f-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .btn-main {
      width: 100%;
      padding: 13px;
      background: var(--brand-mid);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      margin-top: 4px;
    }
    .btn-main:active { opacity: .85; }
    .btn-main:disabled { opacity: .55; cursor: default; }

    .btn-danger {
      width: 100%;
      padding: 12px;
      background: #FEE2E2;
      color: #991B1B;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      margin-top: 8px;
    }
    .btn-danger:active { opacity: .8; }

    /* ── DETAIL SHEET ──────────────────────── */
    .det-info {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px;
      background: #f8f5f2;
      border-radius: 10px;
      margin-bottom: 14px;
    }

    .det-avatar {
      width: 46px; height: 46px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: 600;
      flex-shrink: 0;
    }

    .det-name {
      font-size: 15px;
      font-weight: 600;
      color: var(--text-p);
    }

    .det-sub {
      font-size: 12px;
      color: var(--text-s);
      margin-top: 2px;
    }

    .det-row {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      padding: 10px 0;
      border-bottom: .5px solid var(--border);
      font-size: 13px;
      gap: 12px;
    }
    .det-row:last-of-type { border-bottom: none; }

    .det-lbl { color: var(--text-s); flex-shrink: 0; }
    .det-val { font-weight: 500; color: var(--text-p); text-align: right; }

    .det-btns {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 14px;
    }

    .btn-wa {
      padding: 12px;
      background: #25D366;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
    }
    .btn-wa:active { opacity: .85; }

    /* ── LOADING / EMPTY ───────────────────── */
    .center-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 70px 20px;
      gap: 12px;
    }

    .spinner {
      width: 28px; height: 28px;
      border: 3px solid rgba(181,84,26,.2);
      border-top-color: var(--brand-mid);
      border-radius: 50%;
      animation: spin .75s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .center-text {
      font-size: 13px;
      color: var(--text-s);
      text-align: center;
    }

    .empty-icon { font-size: 38px; }
    .empty-title { font-size: 15px; font-weight: 500; color: var(--text-p); }
    .empty-sub { font-size: 13px; color: var(--text-s); text-align: center; line-height: 1.5; }

    /* ── TOAST ─────────────────────────────── */
    #toast {
      position: fixed;
      bottom: calc(82px + var(--safe-bottom));
      left: 50%;
      transform: translateX(-50%) translateY(16px);
      background: #1a1a1a;
      color: #fff;
      padding: 9px 18px;
      border-radius: 22px;
      font-size: 13px;
      font-weight: 500;
      z-index: 500;
      opacity: 0;
      transition: opacity .2s, transform .2s;
      pointer-events: none;
      white-space: nowrap;
      max-width: 90vw;
      text-align: center;
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>

<!-- LOGIN SCREEN -->
<div id="login-screen">
  <div class="login-logo">📅</div>
  <div class="login-title">Citrino Agenda</div>
  <div class="login-sub">Acceso exclusivo para el equipo</div>
  <div class="login-box">
    <label class="login-label" for="login-pass">Contraseña</label>
    <input id="login-pass" type="password" placeholder="••••••••"
      autocomplete="current-password"
      onkeydown="if(event.key==='Enter')intentarLogin()">
    <div id="login-err"></div>
    <button id="btn-login" onclick="intentarLogin()">Ingresar →</button>
  </div>
</div>

<!-- TOP BAR -->
<div id="topbar">
  <div class="tb-inner">
    <div class="tb-left">
      <span class="tb-title">Agenda</span>
      <span id="badge-count"></span>
    </div>
    <div class="tb-actions">
      <button class="icon-btn" onclick="irHoy()" title="Hoy">🏠</button>
      <button class="icon-btn" onclick="toggleFiltro()" title="Filtrar">⚙️</button>
      <button class="icon-btn" id="btn-refresh" onclick="recargar()" title="Recargar">↻</button>
    </div>
  </div>
  <div id="weekstrip">
    <div class="wk-nav">
      <button onclick="semAnt()" aria-label="Semana anterior">‹</button>
      <span id="wk-label"></span>
      <button onclick="semSig()" aria-label="Semana siguiente">›</button>
    </div>
    <div id="days-row"></div>
  </div>
</div>

<!-- FILTRO -->
<div id="filtro-panel">
  <div class="filtro-title">Mostrar terapeutas</div>
  <div id="filtro-badges"></div>
</div>

<!-- DAY HEADER -->
<div id="day-header">
  <span id="day-header-text"></span>
  <span id="day-header-count"></span>
</div>

<!-- CONTENT -->
<div id="content">
  <div id="grid"></div>
</div>

<!-- FAB -->
<button id="fab" onclick="abrirNuevo()" aria-label="Nuevo turno">+</button>

<!-- TOAST -->
<div id="toast"></div>

<!-- OVERLAY -->
<div id="overlay" onclick="cerrarSheets()"></div>

<!-- SHEET: DETALLE -->
<div class="sheet" id="sheet-det">
  <div class="sheet-handle"></div>
  <div class="sheet-hdr">
    <span class="sheet-title">Detalle del turno</span>
    <button class="sheet-close" onclick="cerrarSheets()">✕</button>
  </div>
  <div class="sheet-body" id="det-body"></div>
</div>

<!-- SHEET: NUEVO TURNO -->
<div class="sheet" id="sheet-nuevo">
  <div class="sheet-handle"></div>
  <div class="sheet-hdr">
    <span class="sheet-title">Nuevo turno</span>
    <button class="sheet-close" onclick="cerrarSheets()">✕</button>
  </div>
  <div class="sheet-body">
    <div class="f-grp">
      <label class="f-lbl">Nombre del cliente *</label>
      <input id="n-nom" type="text" placeholder="Ej: María García" autocomplete="name">
    </div>
    <div class="f-grp">
      <label class="f-lbl">Teléfono WhatsApp</label>
      <input id="n-tel" type="tel" placeholder="59898000000" autocomplete="tel">
    </div>
    <div class="f-grp">
      <label class="f-lbl">Servicio</label>
      <select id="n-ser">
        <option>Método Citrino</option>
        <option>Drenaje Linfático</option>
        <option>Masaje Relax</option>
        <option>Masaje Descontracturante</option>
        <option>Masaje con Piedras</option>
        <option>Reflexología</option>
        <option>Reiki</option>
        <option>Limpieza de Cutis</option>
        <option>Cuponera</option>
        <option>Consulta</option>
        <option>Otro</option>
      </select>
    </div>
    <div class="f-row f-grp">
      <div>
        <label class="f-lbl">Fecha *</label>
        <input id="n-fec" type="date">
      </div>
      <div>
        <label class="f-lbl">Hora *</label>
        <input id="n-hor" type="time" value="09:00" step="1800">
      </div>
    </div>
    <div class="f-grp">
      <label class="f-lbl">Terapeuta</label>
      <select id="n-ter"><option value="">Sin asignar</option></select>
    </div>
    <button class="btn-main" id="btn-crear" onclick="guardarNuevo()">✓ Confirmar turno</button>
  </div>
</div>

<script>
// ════════════════════════════════════════════════════════
// AUTH — contraseña en localStorage, Basic Auth en cada fetch
// ════════════════════════════════════════════════════════
const AUTH_KEY = 'citrino_auth_v1';

function getAuth() { return localStorage.getItem(AUTH_KEY); }
function setAuth(token) { localStorage.setItem(AUTH_KEY, token); }
function clearAuth() { localStorage.removeItem(AUTH_KEY); }

function authHeaders() {
  const t = getAuth();
  return t ? { 'Authorization': 'Basic ' + t } : {};
}

async function intentarLogin() {
  const pass = document.getElementById('login-pass').value.trim();
  const err  = document.getElementById('login-err');
  const btn  = document.getElementById('btn-login');

  if (!pass) { err.textContent = 'Ingresá la contraseña'; return; }

  // Asumimos usuario "nico" (ADMIN_USER en Railway, por defecto "nico")
  const encoded = btoa('nico:' + pass);
  btn.textContent = 'Verificando…'; btn.disabled = true; err.textContent = '';

  try {
    const r = await fetch('/api/agenda/terapeutas', {
      headers: { 'Authorization': 'Basic ' + encoded }
    });

    if (r.ok) {
      setAuth(encoded);
      document.getElementById('login-screen').classList.add('hidden');
      btn.textContent = 'Ingresar →'; btn.disabled = false;
      init();
    } else if (r.status === 401) {
      err.textContent = 'Contraseña incorrecta';
      btn.textContent = 'Ingresar →'; btn.disabled = false;
    } else {
      // Sin ADMIN_PASS configurado en Railway → auth desactivada, igual deja pasar
      setAuth(encoded);
      document.getElementById('login-screen').classList.add('hidden');
      btn.textContent = 'Ingresar →'; btn.disabled = false;
      init();
    }
  } catch {
    err.textContent = 'Sin conexión — intentá de nuevo';
    btn.textContent = 'Ingresar →'; btn.disabled = false;
  }
}

// ════════════════════════════════════════════════════════
// ESTADO GLOBAL
// ════════════════════════════════════════════════════════
const HOY = new Date();
const DIAS_C = ['Do','Lu','Ma','Mi','Ju','Vi','Sá'];
const DIAS_L = ['domingo','lunes','martes','miércoles','jueves','viernes','sábado'];
const MESES  = ['enero','feb.','marzo','abril','mayo','junio','julio','agosto','sep.','oct.','nov.','dic.'];

let semOffset = 0;
let diaSelec  = new Date(HOY);
let terapeutas = [];           // [{id, nombre, color, light}]
let eventosDia = [];           // eventos del día seleccionado
let dotsMap    = {};           // { "2026-06-12": 3 } — cantidad de eventos por día (cache)
let filtroTer  = [];           // IDs de terapeutas a OCULTAR (vacío = mostrar todos)
let detEvento  = null;         // evento abierto en el sheet de detalle

// ════════════════════════════════════════════════════════
// UTILS
// ════════════════════════════════════════════════════════
const fKey = d =>
  `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;

const mismoDia = (a,b) =>
  a.getFullYear()===b.getFullYear() && a.getMonth()===b.getMonth() && a.getDate()===b.getDate();

function getLunes(off=0) {
  const d   = new Date(HOY);
  const day = d.getDay();
  d.setDate(d.getDate() + (day===0 ? -6 : 1-day) + off*7);
  d.setHours(0,0,0,0);
  return d;
}

function hexLight(hex) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},0.09)`;
}

function hora(iso) {
  if (!iso) return '00:00';
  const d = new Date(iso);
  return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}

function calcFin(h0) {
  const [h,m] = h0.split(':').map(Number);
  const fin = h*60+m+90;
  return `${String(Math.floor(fin/60)).padStart(2,'0')}:${String(fin%60).padStart(2,'0')}`;
}

function getTer(id) {
  return terapeutas.find(t=>t.id===id) || { id, nombre: id||'—', color:'#999', light:'rgba(0,0,0,.05)' };
}

let _toastTimer;
function toast(msg, ms=2800) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(()=>el.classList.remove('show'), ms);
}

// ════════════════════════════════════════════════════════
// API
// ════════════════════════════════════════════════════════
async function apiFetch(url, opts={}) {
  const r = await fetch(url, {
    ...opts,
    headers: { ...(opts.headers||{}), ...authHeaders() }
  });
  if (r.status === 401) {
    clearAuth();
    // Mostrar pantalla de login de nuevo
    document.getElementById('login-screen').classList.remove('hidden');
    document.getElementById('login-err').textContent = 'Sesión expirada — ingresá de nuevo';
    throw new Error('Sin autorización');
  }
  if (!r.ok) {
    const e = await r.json().catch(()=>({}));
    throw new Error(e.error || `HTTP ${r.status}`);
  }
  return r.json();
}

async function cargarTerapeutas() {
  try {
    const data = await apiFetch('/api/agenda/terapeutas');
    terapeutas = data.map(t => ({ ...t, light: hexLight(t.color||'#B5541A') }));
  } catch {
    // Fallback hardcoded
    terapeutas = [
      {id:'yetsy',  nombre:'Yetsy',  color:'#2563eb', light:'rgba(37,99,235,.09)'},
      {id:'milena', nombre:'Milena', color:'#7c3aed', light:'rgba(124,58,237,.09)'},
      {id:'nadia',  nombre:'Nadia',  color:'#0891b2', light:'rgba(8,145,178,.09)'},
    ];
  }
  renderFiltroBadges();
  populateTerSelect();
}

async function cargarEventosDia(fecha) {
  renderGrid(null); // loading
  try {
    const desde = new Date(fecha); desde.setHours(0,0,0,0);
    const hasta = new Date(fecha); hasta.setHours(23,59,59,999);
    const data = await apiFetch(
      `/api/agenda/eventos?desde=${desde.toISOString()}&hasta=${hasta.toISOString()}`
    );
    eventosDia = Array.isArray(data) ? data : [];
    dotsMap[fKey(fecha)] = eventosDia.length;
    renderDayHeader();
    renderGrid(eventosDia);
    renderSemana(); // actualiza puntos
  } catch(e) {
    eventosDia = [];
    renderDayHeader();
    renderGrid([], e.message||'Error');
  }
}

async function marcarAsistencia(ev, vino) {
  const userId = ev.clienteTelefono || ev.crm?.telefono;
  if (!userId) { toast('⚠️ Sin teléfono registrado'); return; }
  try {
    await apiFetch(`/api/clientes/${encodeURIComponent(userId)}/asistencia`, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ vino, eventId: ev.id })
    });
    // Actualizar estado local
    const idx = eventosDia.findIndex(e=>e.id===ev.id);
    if (idx>=0) eventosDia[idx].estado = vino ? 'vino' : 'no_vino';
    toast(vino ? '✅ Asistencia confirmada' : '❌ Ausencia registrada');
    cerrarSheets();
    renderGrid(eventosDia);
  } catch(e) {
    toast('Error al guardar: ' + e.message);
  }
}

async function cancelarTurno(id) {
  if (!confirm('¿Cancelar este turno? No se puede deshacer.')) return;
  try {
    await apiFetch(`/api/agenda/cancelar/${encodeURIComponent(id)}`, { method:'DELETE' });
    eventosDia = eventosDia.filter(e=>e.id!==id);
    if (dotsMap[fKey(diaSelec)] > 0) dotsMap[fKey(diaSelec)]--;
    toast('🗑 Turno cancelado');
    cerrarSheets();
    renderGrid(eventosDia);
    renderDayHeader();
    renderSemana();
  } catch(e) {
    toast('Error: ' + e.message);
  }
}

async function guardarNuevo() {
  const nombre = document.getElementById('n-nom').value.trim();
  const tel    = document.getElementById('n-tel').value.trim();
  const ser    = document.getElementById('n-ser').value;
  const fecha  = document.getElementById('n-fec').value;
  const hora_  = document.getElementById('n-hor').value;
  const terId  = document.getElementById('n-ter').value;

  if (!nombre) { toast('⚠️ Ingresá el nombre'); return; }
  if (!fecha || !hora_) { toast('⚠️ Completá fecha y hora'); return; }

  const btn = document.getElementById('btn-crear');
  btn.textContent = 'Guardando…'; btn.disabled = true;

  try {
    await apiFetch('/api/agenda/turno', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ nombre, telefono: tel, servicio: ser, fecha, hora: hora_, terapeutaId: terId })
    });
    toast('✅ Turno creado');
    cerrarSheets();
    cargarEventosDia(diaSelec); // recargar
  } catch(e) {
    toast('Error: ' + e.message);
  } finally {
    btn.textContent = '✓ Confirmar turno'; btn.disabled = false;
  }
}

// ════════════════════════════════════════════════════════
// RENDER
// ════════════════════════════════════════════════════════
function renderSemana() {
  const lun = getLunes(semOffset);
  const dom = new Date(lun); dom.setDate(lun.getDate()+6);
  document.getElementById('wk-label').textContent =
    `${lun.getDate()} – ${dom.getDate()} ${MESES[dom.getMonth()]} ${dom.getFullYear()}`;

  const row = document.getElementById('days-row');
  row.innerHTML = '';
  ['Lu','Ma','Mi','Ju','Vi','Sá','Do'].forEach((n,i) => {
    const d = new Date(lun); d.setDate(lun.getDate()+i);
    const hay = (dotsMap[fKey(d)]||0) > 0;
    const esH = mismoDia(d, HOY);
    const esS = mismoDia(d, diaSelec);
    const cel = document.createElement('div');
    cel.className = 'day-cell' + (esH?' hoy':'') + (esS?' sel':'');
    cel.innerHTML = `<span class="d-name">${n}</span>
      <span class="d-num">${d.getDate()}</span>
      <span class="d-dot${hay?' vis':''}"></span>`;
    const dd = new Date(d);
    cel.onclick = () => selDia(dd);
    row.appendChild(cel);
  });
}

function renderDayHeader() {
  const total = eventosDia.filter(e => !filtroTer.includes(e.terapeutaId)).length;
  const dn = DIAS_L[diaSelec.getDay()];
  document.getElementById('day-header-text').textContent =
    dn[0].toUpperCase()+dn.slice(1) + ', ' + diaSelec.getDate() + ' de ' + MESES[diaSelec.getMonth()];
  document.getElementById('day-header-count').textContent =
    total ? `${total} turno${total!==1?'s':''}` : 'Sin turnos';

  const badge = document.getElementById('badge-count');
  if (mismoDia(diaSelec,HOY) && total>0) {
    badge.textContent = total + ' hoy';
    badge.style.display = '';
  } else {
    badge.style.display = 'none';
  }
}

function renderGrid(evs, err=false) {
  const grid = document.getElementById('grid');

  if (evs === null) {
    grid.innerHTML = `<div class="center-wrap"><div class="spinner"></div><div class="center-text">Cargando turnos…</div></div>`;
    return;
  }
  if (err) {
    grid.innerHTML = `<div class="center-wrap">
      <div class="empty-icon">⚠️</div>
      <div class="empty-title">Sin conexión</div>
      <div class="empty-sub">${typeof err==='string'?err:'Verificá tu internet y recargá'}</div>
    </div>`;
    return;
  }

  const visibles = evs.filter(e => !filtroTer.includes(e.terapeutaId));

  if (visibles.length === 0) {
    grid.innerHTML = `<div class="center-wrap">
      <div class="empty-icon">📅</div>
      <div class="empty-title">Sin turnos</div>
      <div class="empty-sub">No hay turnos para este día.<br>Tocá <strong>+</strong> para agregar uno.</div>
    </div>`;
    return;
  }

  let html = '';
  for (let h = 8; h <= 19; h++) {
    const enH = visibles.filter(e => {
      const [hh] = hora(e.inicio).split(':').map(Number);
      return hh === h;
    });

    html += `<div class="hr-row">
      <div class="hr-lbl">${h}:00</div>
      <div class="hr-slot" onclick="clickSlot(${h})">`;

    if (enH.length) {
      enH.forEach(ev => { html += cardHTML(ev); });
    } else if (h < 19) {
      html += `<span class="empty-hint">+ ${h}:00</span>`;
    }

    html += `</div></div>`;
  }

  grid.innerHTML = html;

  // Attach listeners después de insertar
  grid.querySelectorAll('.appt[data-id]').forEach(el => {
    el.addEventListener('click', function(e) {
      if (e.target.closest('.act-btn')) return;
      const ev = eventosDia.find(x=>x.id===this.dataset.id);
      if (ev) abrirDetalle(ev);
    });
  });
}

function cardHTML(ev) {
  const t = getTer(ev.terapeutaId);
  const h0 = hora(ev.inicio);
  const h1 = ev.fin ? hora(ev.fin) : calcFin(h0);
  const est = ev.estado || 'pendiente';
  const nom = ev.clienteNombre || ev.titulo || 'Cliente';
  const tel = ev.clienteTelefono || '';

  const estChip = est==='vino'
    ? `<span class="chip" style="background:#D1FAE5;color:#065F46;">vino ✓</span>`
    : est==='no_vino'
    ? `<span class="chip" style="background:#FEE2E2;color:#991B1B;">no vino</span>`
    : '';

  const crm = ev.crm||{};
  const sesChip = (crm.cuponera==='si' && crm.sesRest>0)
    ? `<span class="chip" style="background:rgba(234,88,12,.1);color:#C2410C;">📦 ${crm.sesRest} ses.</span>`
    : '';

  let acciones = '';
  if (est==='pendiente') {
    acciones = `<div class="appt-actions">
      <button class="act-btn" style="background:#D1FAE5;color:#065F46;"
        onclick="event.stopPropagation();asistir('${ev.id}',true)">✓ Vino</button>
      <button class="act-btn" style="background:#FEE2E2;color:#991B1B;"
        onclick="event.stopPropagation();asistir('${ev.id}',false)">✕ No vino</button>
      ${tel?`<button class="act-btn" style="background:#f0f0f0;color:#333;flex:0;padding:6px 10px;"
        onclick="event.stopPropagation();abrirWA('${tel}')">💬</button>`:''}
    </div>`;
  }

  return `<div class="appt" data-id="${ev.id}"
    style="border-left-color:${t.color};background:${t.light};">
    <div class="appt-time" style="color:${t.color};">${h0} – ${h1}</div>
    <div class="appt-name">${nom}</div>
    <div class="appt-service">${ev.servicio||''}</div>
    <div class="appt-chips">
      <span class="chip" style="background:${t.color}18;color:${t.color};">${t.nombre}</span>
      ${estChip}${sesChip}
    </div>
    ${acciones}
  </div>`;
}

function renderFiltroBadges() {
  document.getElementById('filtro-badges').innerHTML = terapeutas.map(t => {
    const activo = !filtroTer.includes(t.id);
    return `<div class="ter-badge"
      style="border-color:${t.color};background:${activo?t.color:'transparent'};color:${activo?'#fff':t.color};"
      onclick="toggleTer('${t.id}')">
      <span class="ter-dot" style="background:${activo?'rgba(255,255,255,.7)':t.color};"></span>
      ${t.nombre}
    </div>`;
  }).join('');
}

function populateTerSelect() {
  document.getElementById('n-ter').innerHTML =
    '<option value="">Sin asignar</option>' +
    terapeutas.map(t=>`<option value="${t.id}">${t.nombre}</option>`).join('');
}

// ════════════════════════════════════════════════════════
// NAVEGACIÓN
// ════════════════════════════════════════════════════════
function selDia(d) {
  diaSelec = new Date(d);
  const lun = getLunes(semOffset);
  const dom = new Date(lun); dom.setDate(lun.getDate()+6);
  if (d < lun) semOffset--;
  else if (d > dom) semOffset++;
  renderSemana();
  cargarEventosDia(diaSelec);
  cerrarSheets();
}

function semAnt() { semOffset--; diaSelec=getLunes(semOffset); renderSemana(); cargarEventosDia(diaSelec); }
function semSig() { semOffset++; diaSelec=getLunes(semOffset); renderSemana(); cargarEventosDia(diaSelec); }
function irHoy()  { semOffset=0; diaSelec=new Date(HOY); renderSemana(); cargarEventosDia(diaSelec); }

function recargar() {
  const btn = document.getElementById('btn-refresh');
  btn.style.animation = 'spin .75s linear infinite';
  cargarEventosDia(diaSelec).finally(() => { btn.style.animation=''; });
}

// ════════════════════════════════════════════════════════
// FILTRO
// ════════════════════════════════════════════════════════
function toggleFiltro() {
  document.getElementById('filtro-panel').classList.toggle('open');
  calcOffsets();
}

function toggleTer(id) {
  if (filtroTer.includes(id)) filtroTer = filtroTer.filter(x=>x!==id);
  else filtroTer.push(id);
  renderFiltroBadges();
  renderGrid(eventosDia);
  renderDayHeader();
}

// ════════════════════════════════════════════════════════
// SHEETS
// ════════════════════════════════════════════════════════
function abrirDetalle(ev) {
  detEvento = ev;
  const t   = getTer(ev.terapeutaId);
  const h0  = hora(ev.inicio);
  const h1  = ev.fin ? hora(ev.fin) : calcFin(h0);
  const est = ev.estado || 'pendiente';
  const nom = ev.clienteNombre || ev.titulo || 'Cliente';
  const tel = ev.clienteTelefono || '';
  const crm = ev.crm || {};

  const estLabel = { pendiente:'⏳ Pendiente', vino:'✅ Vino', no_vino:'❌ No vino' }[est] || est;

  let actBtns = '';
  if (est==='pendiente') {
    actBtns = `<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:16px;">
      <button class="btn-main" style="margin:0;background:#16A34A;" onclick="_asistirDet(true)">✓ Vino</button>
      <button class="btn-main" style="margin:0;background:#DC2626;" onclick="_asistirDet(false)">✕ No vino</button>
    </div>`;
  }

  let botBtns = '<div class="det-btns">';
  if (tel) botBtns += `<button class="btn-wa" onclick="abrirWA('${tel}')">💬 WhatsApp</button>`;
  botBtns += `<button class="btn-danger" style="margin:0;" onclick="_cancelarDet('${ev.id}')">🗑 Cancelar</button>`;
  botBtns += '</div>';

  document.getElementById('det-body').innerHTML = `
    <div class="det-info">
      <div class="det-avatar" style="background:${t.light};color:${t.color};">${nom.charAt(0).toUpperCase()}</div>
      <div>
        <div class="det-name">${nom}</div>
        <div class="det-sub">${ev.servicio||'Servicio'} · ${t.nombre}</div>
      </div>
    </div>
    <div class="det-row"><span class="det-lbl">🕐 Horario</span><span class="det-val">${h0} – ${h1}</span></div>
    <div class="det-row"><span class="det-lbl">📋 Estado</span><span class="det-val">${estLabel}</span></div>
    ${tel?`<div class="det-row"><span class="det-lbl">📱 Teléfono</span><span class="det-val">${tel}</span></div>`:''}
    ${crm.cuponera==='si'?`<div class="det-row"><span class="det-lbl">📦 Cuponera</span><span class="det-val" style="color:#C2410C;">${crm.sesRest||'?'} sesiones rest.</span></div>`:''}
    ${crm.notas?`<div class="det-row"><span class="det-lbl">📝 Notas CRM</span><span class="det-val" style="font-size:12px;">${crm.notas}</span></div>`:''}
    ${actBtns}
    ${botBtns}`;

  openSheet('sheet-det');
}

function _asistirDet(v) { if (detEvento) marcarAsistencia(detEvento, v); }
function _cancelarDet(id) { cancelarTurno(id); }

function abrirNuevo(h='') {
  document.getElementById('n-fec').value = fKey(diaSelec);
  document.getElementById('n-hor').value = h || '09:00';
  document.getElementById('n-nom').value = '';
  document.getElementById('n-tel').value = '';
  openSheet('sheet-nuevo');
}

function clickSlot(h) { abrirNuevo(String(h).padStart(2,'0')+':00'); }

function asistir(id, vino) {
  const ev = eventosDia.find(e=>e.id===id);
  if (ev) marcarAsistencia(ev, vino);
}

function abrirWA(tel) {
  window.open('https://wa.me/'+tel.replace(/\D/g,''), '_blank');
}

function openSheet(id) {
  document.getElementById('overlay').classList.add('open');
  document.getElementById(id).classList.add('open');
}

function cerrarSheets() {
  document.getElementById('overlay').classList.remove('open');
  document.querySelectorAll('.sheet').forEach(s=>s.classList.remove('open'));
}

// ════════════════════════════════════════════════════════
// LAYOUT — calcular offsets dinámicamente
// ════════════════════════════════════════════════════════
function calcOffsets() {
  const topbar   = document.getElementById('topbar');
  const filtro   = document.getElementById('filtro-panel');
  const dayHdr   = document.getElementById('day-header');
  const content  = document.getElementById('content');

  const topH     = topbar.offsetHeight;
  const filtroH  = filtro.classList.contains('open') ? filtro.offsetHeight : 0;

  filtro.style.top = topH + 'px';
  dayHdr.style.top = (topH + filtroH) + 'px';
  content.style.paddingTop = (topH + filtroH + dayHdr.offsetHeight) + 'px';
}

// ════════════════════════════════════════════════════════
// SERVICE WORKER
// ════════════════════════════════════════════════════════
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker
      .register('/app/agenda/sw.js', { scope: '/app/agenda/' })
      .catch(()=>{});
  });
}

// ════════════════════════════════════════════════════════
// INIT
// ════════════════════════════════════════════════════════
async function init() {
  calcOffsets();
  window.addEventListener('resize', calcOffsets);
  renderSemana();
  renderDayHeader();
  renderGrid(null); // loading inicial
  await cargarTerapeutas();
  await cargarEventosDia(diaSelec);
  calcOffsets();
}

// ── Arranque: mostrar login o ir directo ──
(function arrancar() {
  if (getAuth()) {
    // Ya tiene credenciales guardadas — mostrar app directo
    document.getElementById('login-screen').classList.add('hidden');
    init();
  }
  // Si no tiene auth, el login-screen se muestra por defecto (no tiene clase hidden)
})();
</script>
