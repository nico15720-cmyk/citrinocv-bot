<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>El Cerebro — Citrino</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
         background: #FFF8F3; height: 100dvh; display: flex; flex-direction: column;
         overflow: hidden; }

  header {
    background: linear-gradient(135deg, #991B1B, #C2410C);
    color: white; padding: 14px 16px;
    display: flex; align-items: center; justify-content: space-between;
    flex-shrink: 0; box-shadow: 0 2px 8px rgba(0,0,0,.2);
  }
  .header-left { display: flex; align-items: center; gap: 10px; }
  .header-icon { font-size: 24px; }
  .header-title { font-size: 17px; font-weight: 700; }
  .header-sub { font-size: 12px; opacity: .75; }
  .btn-hdr {
    background: rgba(255,255,255,.2); border: none; border-radius: 20px;
    color: white; padding: 6px 14px; font-size: 13px; cursor: pointer;
  }
  .btn-hdr:hover { background: rgba(255,255,255,.3); }

  #chat {
    flex: 1; overflow-y: auto; padding: 16px 12px; display: flex;
    flex-direction: column; gap: 10px;
  }
  .bubble {
    max-width: 82%; padding: 10px 13px; border-radius: 16px;
    font-size: 14px; line-height: 1.5; white-space: pre-wrap;
  }
  .bubble.nico {
    align-self: flex-end; background: #EA580C; color: white;
    border-bottom-right-radius: 4px;
  }
  .bubble.bot {
    align-self: flex-start; background: white; color: #222;
    border: 1px solid #F3D5C0; border-bottom-left-radius: 4px;
    box-shadow: 0 1px 3px rgba(0,0,0,.08);
  }
  .bubble.system {
    align-self: center; background: #FEF3C7; color: #92400E;
    font-size: 12px; border-radius: 12px; padding: 6px 12px;
    border: 1px solid #FDE68A;
  }
  .typing { display: flex; gap: 4px; align-items: center; padding: 12px 14px; }
  .dot { width: 7px; height: 7px; background: #C2410C; border-radius: 50%;
         animation: bounce .9s infinite; }
  .dot:nth-child(2) { animation-delay: .15s; }
  .dot:nth-child(3) { animation-delay: .3s; }
  @keyframes bounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-6px)} }

  .input-bar {
    flex-shrink: 0; background: white; border-top: 1px solid #F3D5C0;
    padding: 10px 12px; display: flex; flex-direction: column; gap: 8px;
  }

  /* Push-to-talk */
  #micBtn {
    border: none; border-radius: 14px; padding: 14px;
    font-size: 15px; font-weight: 600; cursor: pointer;
    transition: all .15s; user-select: none; -webkit-user-select: none;
    touch-action: none;
    background: #EA580C; color: white;
  }
  #micBtn.listening { background: #991B1B; animation: pulse 1s infinite; }
  #micBtn.processing { background: #78716C; }
  @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.025)} }

  .text-row { display: flex; gap: 8px; align-items: flex-end; }
  #msgInput {
    flex: 1; border: 1px solid #E5D6CB; border-radius: 20px;
    padding: 9px 14px; font-size: 14px; background: #FFF8F3;
    outline: none; resize: none; max-height: 100px; min-height: 38px;
    font-family: inherit; line-height: 1.4;
  }
  #msgInput:focus { border-color: #EA580C; }
  .btn-send {
    background: #EA580C; color: white; border: none; border-radius: 50%;
    width: 38px; height: 38px; font-size: 18px; cursor: pointer;
    flex-shrink: 0; display: flex; align-items: center; justify-content: center;
  }
  .btn-end {
    background: #FFF8F3; color: #991B1B; border: 1px solid #991B1B;
    border-radius: 20px; padding: 8px 14px; font-size: 13px;
    font-weight: 600; cursor: pointer;
  }

  /* Panel lateral */
  #panelOverlay {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,.4); z-index: 10;
  }
  #panel {
    position: fixed; top: 0; right: 0; bottom: 0; width: min(380px, 100vw);
    background: white; z-index: 11; display: flex; flex-direction: column;
    transform: translateX(100%); transition: transform .25s ease;
    box-shadow: -4px 0 20px rgba(0,0,0,.15);
  }
  #panel.open { transform: translateX(0); }
  .panel-hdr {
    background: linear-gradient(135deg, #991B1B, #C2410C);
    color: white; padding: 14px 16px;
    display: flex; align-items: center; justify-content: space-between;
    flex-shrink: 0;
  }
  .panel-hdr-title { font-size: 16px; font-weight: 700; }
  .btn-close { background: none; border: none; color: white; font-size: 22px; cursor: pointer; }
  .btn-add-k {
    background: rgba(255,255,255,.25); border: none; border-radius: 14px;
    color: white; padding: 5px 12px; font-size: 13px; cursor: pointer;
  }
  #panelBody { flex: 1; overflow-y: auto; padding: 12px; display: flex; flex-direction: column; gap: 8px; }

  .k-card {
    background: #FFF8F3; border: 1px solid #F3D5C0; border-radius: 12px; padding: 10px 12px;
  }
  .k-cat-label { font-size: 11px; font-weight: 700; color: #C2410C;
                 text-transform: uppercase; letter-spacing: .5px; margin-top:8px; padding: 0 2px; }
  .k-content { font-size: 13px; color: #333; line-height: 1.4; }
  .k-meta { font-size: 11px; color: #999; margin-top: 4px; }
  .k-actions { display: flex; gap: 6px; margin-top: 8px; }
  .btn-k { border: none; border-radius: 8px; padding: 4px 10px; font-size: 12px; cursor: pointer; }
  .btn-k.edit { background: #FEF3C7; color: #92400E; }
  .btn-k.del  { background: #FEE2E2; color: #991B1B; }
  .k-edit-area { display: none; flex-direction: column; gap: 6px; margin-top: 8px; }
  .k-edit-area select, .k-edit-area textarea {
    width: 100%; border: 1px solid #E5D6CB; border-radius: 8px;
    padding: 7px; font-size: 13px; font-family: inherit; background: white;
  }
  .k-edit-area textarea { min-height: 60px; resize: vertical; }
  .btn-save-edit { background: #EA580C; color: white; border: none; border-radius: 8px;
                   padding: 5px 14px; font-size: 13px; cursor: pointer; }

  #addForm {
    background: #FFF8F3; border: 1px dashed #EA580C; border-radius: 12px;
    padding: 12px; display: none; flex-direction: column; gap: 8px;
  }
  #addForm select, #addForm textarea {
    width: 100%; border: 1px solid #E5D6CB; border-radius: 8px;
    padding: 7px; font-size: 13px; font-family: inherit; background: white;
  }
  #addForm textarea { min-height: 70px; resize: vertical; }
  .add-actions { display: flex; gap: 8px; }
  .btn-save-new { background: #EA580C; color: white; border: none; border-radius: 8px;
                  padding: 7px 18px; font-size: 13px; cursor: pointer; flex: 1; }
  .btn-cancel { background: #F3D5C0; color: #991B1B; border: none; border-radius: 8px;
                padding: 7px 14px; font-size: 13px; cursor: pointer; }

  .panel-empty { text-align: center; padding: 32px; color: #999; font-size: 14px; }

  /* Modal */
  #modalOverlay {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,.5);
    z-index: 20; align-items: center; justify-content: center; padding: 16px;
  }
  #modalOverlay.open { display: flex; }
  .modal {
    background: white; border-radius: 20px; padding: 24px;
    max-width: 360px; width: 100%; max-height: 80vh; overflow-y: auto;
  }
  .modal h3 { font-size: 18px; color: #991B1B; margin-bottom: 12px; }
  .ap-item {
    background: #FFF8F3; border-left: 3px solid #EA580C;
    border-radius: 0 8px 8px 0; padding: 8px 12px; margin-bottom: 8px; font-size: 13px;
  }
  .ap-cat { font-size: 11px; color: #C2410C; font-weight: 700; }
  .btn-modal-ok {
    width: 100%; background: #EA580C; color: white; border: none;
    border-radius: 12px; padding: 12px; font-size: 15px; font-weight: 600;
    cursor: pointer; margin-top: 16px;
  }
</style>
</head>
<body>

<header>
  <div class="header-left">
    <span class="header-icon">🧠</span>
    <div>
      <div class="header-title">El Cerebro</div>
      <div class="header-sub">Enseñale al bot sobre Citrino</div>
    </div>
  </div>
  <button class="btn-hdr" onclick="openPanel()">📋 Conocimiento</button>
</header>

<div id="chat"></div>

<div class="input-bar">
  <button id="micBtn">🎙️ Mantené presionado para hablar</button>
  <div class="text-row">
    <textarea id="msgInput" placeholder="O escribí acá..." rows="1"
      onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendText()}"
      oninput="autoResize(this)"></textarea>
    <button class="btn-send" onclick="sendText()">↑</button>
    <button class="btn-end" onclick="confirmarFin()">Finalizar</button>
  </div>
</div>

<!-- Panel Conocimiento -->
<div id="panelOverlay" onclick="closePanel()"></div>
<div id="panel">
  <div class="panel-hdr">
    <span class="panel-hdr-title">🧠 Conocimiento guardado</span>
    <div style="display:flex;gap:8px;align-items:center">
      <button class="btn-add-k" onclick="toggleAddForm()">+ Agregar</button>
      <button class="btn-close" onclick="closePanel()">✕</button>
    </div>
  </div>
  <div id="panelBody">
    <div id="addForm">
      <select id="newCat">
        <option>Clientas</option><option>Terapeutas</option>
        <option>Precios y Productos</option><option>Reglas de Negocio</option>
        <option>Contabilidad</option><option>Situaciones Especiales</option>
        <option>Sistema</option><option>General</option>
      </select>
      <textarea id="newContent" placeholder="Escribí el conocimiento que querés guardar..."></textarea>
      <div class="add-actions">
        <button class="btn-cancel" onclick="toggleAddForm()">Cancelar</button>
        <button class="btn-save-new" onclick="saveNewKnowledge()">Guardar</button>
      </div>
    </div>
    <div id="panelList" style="display:flex;flex-direction:column;gap:8px;padding:12px;"></div>
  </div>
</div>

<!-- Modal fin -->
<div id="modalOverlay">
  <div class="modal">
    <h3>✅ Clase guardada</h3>
    <div id="modalContent"></div>
    <button class="btn-modal-ok" onclick="closeModal()">Perfecto</button>
  </div>
</div>

<script>
// ── Auth ──────────────────────────────────────────────────────
if (!sessionStorage.getItem("teach_auth")) {
  const u = prompt("Usuario:") || "";
  const p = prompt("Contraseña:") || "";
  sessionStorage.setItem("teach_auth", btoa(u + ":" + p));
}
function hdrs() {
  return { "Authorization": "Basic " + sessionStorage.getItem("teach_auth"),
           "Content-Type": "application/json" };
}

// ── Estado ────────────────────────────────────────────────────
let isListening = false, isProcessing = false;
let mediaRecorder = null, audioChunks = [];
const micBtn = document.getElementById("micBtn");

// ── Bienvenida ────────────────────────────────────────────────
addBubble("bot", "¡Hola! Soy el cerebro de Citrino.\nContame sobre el negocio, las clientas, las reglas. Al terminar guardamos todo. 🌿");

// ── Push-to-talk ──────────────────────────────────────────────
micBtn.addEventListener("mousedown",   startListen);
micBtn.addEventListener("touchstart",  startListen, { passive: false });
micBtn.addEventListener("mouseup",     stopListen);
micBtn.addEventListener("touchend",    stopListen);
micBtn.addEventListener("mouseleave",  e => { if (isListening) stopListen(e); });
document.addEventListener("touchcancel", e => { if (isListening) stopListen(e); });

async function startListen(e) {
  e.preventDefault();
  if (isProcessing || isListening) return;
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    audioChunks = [];
    const mimeType = MediaRecorder.isTypeSupported("audio/webm;codecs=opus")
      ? "audio/webm;codecs=opus"
      : MediaRecorder.isTypeSupported("audio/webm") ? "audio/webm" : "";
    mediaRecorder = new MediaRecorder(stream, mimeType ? { mimeType } : {});
    mediaRecorder.addEventListener("dataavailable", e => { if (e.data.size > 0) audioChunks.push(e.data); });
    mediaRecorder.start(100); // chunk cada 100ms
    isListening = true;
    micBtn.textContent = "🔴 Escuchando... (soltá para enviar)";
    micBtn.classList.add("listening");
  } catch {
    addBubble("system", "⚠️ Sin acceso al micrófono. Revisá los permisos del navegador.");
  }
}

async function stopListen(e) {
  if (!isListening || !mediaRecorder) return;
  isListening = false;
  isProcessing = true;
  micBtn.textContent = "⏳ Procesando...";
  micBtn.classList.remove("listening");
  micBtn.classList.add("processing");
  micBtn.disabled = true;

  mediaRecorder.stop();
  mediaRecorder.stream.getTracks().forEach(t => t.stop());

  mediaRecorder.addEventListener("stop", async () => {
    try {
      const mimeUsed = mediaRecorder.mimeType || "audio/webm";
      const blob = new Blob(audioChunks, { type: mimeUsed });
      if (blob.size < 500) throw new Error("corto");

      const base64 = await new Promise(res => {
        const fr = new FileReader();
        fr.onload = () => res(fr.result);
        fr.readAsDataURL(blob);
      });

      const resp = await fetch("/api/teach/audio", {
        method: "POST", headers: hdrs(),
        body: JSON.stringify({ audio: base64.split(",")[1], mimeType: mimeUsed }),
      });
      const data = await resp.json();
      if (data.error) throw new Error(data.error);
      if (data.transcripcion) addBubble("nico", data.transcripcion);
      showTyping();
      await new Promise(r => setTimeout(r, 0)); // allow DOM to update
      removeTyping();
      addBubble("bot", data.reply || "Sin respuesta.");
    } catch (err) {
      const msg = err.message === "corto"
        ? "Mantené presionado mientras hablás."
        : "No pude procesar el audio. Intentá de nuevo o escribí.";
      addBubble("system", "⚠️ " + msg);
    } finally {
      isProcessing = false;
      micBtn.disabled = false;
      micBtn.textContent = "🎙️ Mantené presionado para hablar";
      micBtn.classList.remove("processing");
    }
  }, { once: true });
}

// ── Texto ─────────────────────────────────────────────────────
async function sendText() {
  const input = document.getElementById("msgInput");
  const msg = input.value.trim();
  if (!msg || isProcessing) return;
  input.value = ""; input.style.height = "";
  addBubble("nico", msg);
  showTyping();
  try {
    const resp = await fetch("/api/teach/chat", {
      method: "POST", headers: hdrs(), body: JSON.stringify({ message: msg }),
    });
    const data = await resp.json();
    removeTyping();
    addBubble("bot", data.reply || "Error.");
  } catch { removeTyping(); addBubble("system", "⚠️ Error de conexión."); }
}

// ── UI helpers ────────────────────────────────────────────────
function addBubble(type, text) {
  const chat = document.getElementById("chat");
  const d = document.createElement("div");
  d.className = "bubble " + type;
  d.textContent = text;
  chat.appendChild(d);
  chat.scrollTop = chat.scrollHeight;
}
let typingEl = null;
function showTyping() {
  const chat = document.getElementById("chat");
  typingEl = document.createElement("div");
  typingEl.className = "bubble bot typing";
  typingEl.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';
  chat.appendChild(typingEl);
  chat.scrollTop = chat.scrollHeight;
}
function removeTyping() { if (typingEl) { typingEl.remove(); typingEl = null; } }
function autoResize(el) { el.style.height = ""; el.style.height = Math.min(el.scrollHeight,100)+"px"; }

// ── Finalizar ─────────────────────────────────────────────────
async function confirmarFin() {
  if (!confirm("¿Terminamos la clase y guardamos lo aprendido?")) return;
  addBubble("system", "⏳ Guardando conocimiento...");
  try {
    const resp = await fetch("/api/teach/end", { method: "POST", headers: hdrs() });
    const data = await resp.json();
    if (data.ok && data.aprendizajes?.length) {
      showModal(data.aprendizajes);
    } else {
      addBubble("system", "La clase fue corta. No había suficiente para guardar.");
    }
  } catch { addBubble("system", "⚠️ Error al guardar."); }
}
function showModal(aps) {
  document.getElementById("modalContent").innerHTML =
    `<p style="color:#555;font-size:13px;margin-bottom:12px">Se guardaron ${aps.length} aprendizaje(s):</p>` +
    aps.map(a=>`<div class="ap-item"><div class="ap-cat">${esc(a.Categoria)}</div>${esc(a.Contenido)}</div>`).join("");
  document.getElementById("modalOverlay").classList.add("open");
}
function closeModal() {
  document.getElementById("modalOverlay").classList.remove("open");
  addBubble("system", "✅ Guardado en el Cerebro. Podés empezar otra clase cuando quieras.");
}

// ── Panel de conocimiento ─────────────────────────────────────
async function openPanel() {
  document.getElementById("panelOverlay").style.display = "block";
  document.getElementById("panel").classList.add("open");
  await loadKnowledge();
}
function closePanel() {
  document.getElementById("panelOverlay").style.display = "none";
  document.getElementById("panel").classList.remove("open");
}

async function loadKnowledge() {
  const list = document.getElementById("panelList");
  list.innerHTML = '<div class="panel-empty">Cargando...</div>';
  try {
    const resp = await fetch("/api/teach/conocimiento", { headers: hdrs() });
    const rows = await resp.json();
    list.innerHTML = "";
    if (!rows.length) {
      list.innerHTML = '<div class="panel-empty">Todavía no hay conocimiento guardado.<br>¡Empezá una clase!</div>';
      return;
    }
    const grouped = {};
    for (const r of rows) {
      if (!r.Contenido) continue;
      const c = r.Categoria || "General";
      if (!grouped[c]) grouped[c] = [];
      grouped[c].push(r);
    }
    for (const [cat, items] of Object.entries(grouped)) {
      const catEl = document.createElement("div");
      catEl.className = "k-cat-label";
      catEl.textContent = cat;
      list.appendChild(catEl);
      for (const row of items) {
        list.appendChild(makeCard(row));
      }
    }
  } catch { list.innerHTML = '<div class="panel-empty">❌ Error cargando.</div>'; }
}

function makeCard(row) {
  const card = document.createElement("div");
  card.className = "k-card";
  const cats = ["Clientas","Terapeutas","Precios y Productos","Reglas de Negocio","Contabilidad","Situaciones Especiales","Sistema","General"];
  card.innerHTML = `
    <div class="k-content">${esc(row.Contenido)}</div>
    <div class="k-meta">${row.Fuente==="manual"?"✍️ manual":"📚 clase"} · ${row.Fecha}</div>
    <div class="k-actions">
      <button class="btn-k edit" onclick="this.closest('.k-card').querySelector('.k-edit-area').style.display='flex'">✏️ Editar</button>
      <button class="btn-k del"  onclick="delK(${row._rowIndex},this)">🗑️ Borrar</button>
    </div>
    <div class="k-edit-area">
      <select>${cats.map(c=>`<option${c===row.Categoria?" selected":""}>${c}</option>`).join("")}</select>
      <textarea>${esc(row.Contenido)}</textarea>
      <button class="btn-save-edit" onclick="saveEdit(${row._rowIndex},'${esc(row.Fecha)}',this)">Guardar</button>
    </div>`;
  return card;
}

async function saveEdit(rowIndex, fecha, btn) {
  const area = btn.closest(".k-edit-area");
  const contenido = area.querySelector("textarea").value.trim();
  const categoria = area.querySelector("select").value;
  if (!contenido) return;
  btn.textContent = "...";
  try {
    await fetch(`/api/teach/conocimiento/${rowIndex}`, {
      method: "PUT", headers: hdrs(),
      body: JSON.stringify({ Fecha: fecha, Categoria: categoria, Contenido: contenido, Fuente: "manual" }),
    });
    await loadKnowledge();
  } catch { alert("Error al guardar."); btn.textContent = "Guardar"; }
}

async function delK(rowIndex, btn) {
  if (!confirm("¿Borrar este conocimiento?")) return;
  btn.textContent = "...";
  try {
    await fetch(`/api/teach/conocimiento/${rowIndex}`, { method: "DELETE", headers: hdrs() });
    await loadKnowledge();
  } catch { alert("Error."); }
}

function toggleAddForm() {
  const f = document.getElementById("addForm");
  const isOpen = f.style.display === "flex";
  f.style.display = isOpen ? "none" : "flex";
  f.style.flexDirection = "column";
  if (!isOpen) document.getElementById("newContent").focus();
}
async function saveNewKnowledge() {
  const cat = document.getElementById("newCat").value;
  const cont = document.getElementById("newContent").value.trim();
  if (!cont) return;
  try {
    await fetch("/api/teach/conocimiento", {
      method: "POST", headers: hdrs(), body: JSON.stringify({ categoria: cat, contenido: cont }),
    });
    document.getElementById("newContent").value = "";
    document.getElementById("addForm").style.display = "none";
    await loadKnowledge();
  } catch { alert("Error al guardar."); }
}

function esc(str) {
  return String(str||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}
</script>
</body>
</html>
