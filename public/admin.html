<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="theme-color" content="#0a0f0d"/>
<title>Citrino — CRM</title>
<link rel="stylesheet" href="/citrino-ui.css"/>
<style>
.admin-hero{
  background:radial-gradient(ellipse at 15% -5%,rgba(59,130,246,.18) 0%,transparent 55%),
             radial-gradient(ellipse at 85% 105%,rgba(34,197,94,.1) 0%,transparent 50%),
             var(--bg2);
  padding:calc(env(safe-area-inset-top,0px)+14px) 16px 16px;
}
.admin-topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.admin-logo{width:30px;height:30px;border-radius:9px;background:linear-gradient(135deg,#1d4ed8,#3b82f6);display:flex;align-items:center;justify-content:center;font-size:15px}
.search-wrap{position:relative}
.search-input{width:100%;padding:11px 14px 11px 38px;background:var(--surface);border:1px solid var(--border2);border-radius:14px;color:var(--text);font-size:14px;outline:none;font-family:inherit;transition:border-color .2s;-webkit-appearance:none}
.search-input:focus{border-color:var(--green-dim)}
.search-ico{position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:16px;pointer-events:none}
.stat-pills{display:flex;gap:8px;padding:10px 16px 0;overflow-x:auto;scrollbar-width:none}
.stat-pills::-webkit-scrollbar{display:none}
.stat-pill{flex-shrink:0;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:8px 12px;text-align:center;min-width:68px}
.sp-val{font-size:18px;font-weight:800;letter-spacing:-.2px}
.sp-lbl{font-size:10px;color:var(--text3);margin-top:2px;font-weight:500}
.filter-row{display:flex;gap:6px;padding:10px 16px 2px;overflow-x:auto;scrollbar-width:none}
.filter-row::-webkit-scrollbar{display:none}
.sort-row{display:flex;gap:4px;padding:6px 16px;align-items:center}
.sort-btn{background:none;border:none;color:var(--text3);font-size:12px;cursor:pointer;padding:4px 8px;border-radius:8px;font-family:inherit;font-weight:500;transition:.15s}
.sort-btn.a{color:var(--green);background:var(--green-subtle)}
.clist{padding:6px 16px}
.ccard{background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);padding:12px 14px;margin-bottom:8px;cursor:pointer;animation:fadeUp .25s cubic-bezier(.4,0,.2,1) both;transition:all .18s;position:relative}
.ccard::after{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:3px 0 0 3px;opacity:0;transition:opacity .2s}
.ccard.vip::after{background:var(--amber);opacity:1}
.ccard.vino::after{background:var(--green);opacity:1}
.ccard.riesgo::after{background:var(--red);opacity:.7}
.ccard:active{background:var(--surface2);transform:scale(.985)}
.ct{display:flex;align-items:center;gap:10px}
.cav{width:40px;height:40px;border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;flex-shrink:0}
.ci{flex:1;min-width:0}
.cn{font-size:14px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cs{font-size:11px;color:var(--text3);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cr{flex-shrink:0;display:flex;flex-direction:column;align-items:flex-end;gap:4px}
.dias-badge{font-size:10px;padding:2px 6px;border-radius:8px;background:var(--surface2);color:var(--text3);font-weight:600}
.dias-badge.warn{background:rgba(245,158,11,.1);color:var(--amber)}
.det-av{width:56px;height:56px;border-radius:18px;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:700;margin:0 auto 10px}
.stars-row{display:flex;gap:4px;justify-content:center;margin:6px 0}
.star{font-size:20px;color:var(--text4);cursor:pointer;transition:color .1s,transform .1s}
.star.on{color:var(--amber)}
.star:active{transform:scale(.85)}
.status-opts{display:flex;gap:6px;flex-wrap:wrap;padding:10px 20px 4px}
.s-opt{padding:7px 12px;border-radius:10px;border:1.5px solid var(--border2);background:var(--surface);cursor:pointer;font-size:11px;font-weight:600;color:var(--text3);transition:.15s}
.s-opt.sel{border-color:var(--green-dim);background:var(--green-subtle);color:var(--green)}
.s-opt:active{transform:scale(.93)}
.det-actions{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:14px 20px 8px}
.det-btn{padding:12px;border:none;border-radius:12px;font-size:13px;font-weight:700;cursor:pointer;transition:.15s;text-align:center;text-decoration:none;display:block}
.det-btn:active{transform:scale(.94)}
.det-wa{background:rgba(34,197,94,.1);color:var(--green)}
.det-nota{background:var(--surface2);color:var(--text)}
.det-full{grid-column:1/-1;background:rgba(34,197,94,.07);color:var(--green);border:1px solid rgba(34,197,94,.2)}
</style>
</head>
<body>

<div class="admin-hero">
  <div class="admin-topbar">
    <div style="display:flex;align-items:center;gap:10px">
      <div class="admin-logo">👥</div>
      <span style="font-size:16px;font-weight:700">Clientes CRM</span>
    </div>
    <div style="display:flex;gap:6px">
      <button class="btn-icon" onclick="loadClientes()">🔄</button>
      <button class="btn-icon" onclick="exportarCSV()">📤</button>
    </div>
  </div>
  <div class="search-wrap">
    <span class="search-ico">🔍</span>
    <input class="search-input" id="searchInput" placeholder="Buscar nombre, teléfono..." oninput="renderClientes()"/>
  </div>
</div>

<div class="stat-pills" id="statPills">
  <div class="stat-pill"><div class="sp-val" id="sTot">–</div><div class="sp-lbl">Total</div></div>
  <div class="stat-pill"><div class="sp-val t-green" id="sVin">–</div><div class="sp-lbl">Vinieron</div></div>
  <div class="stat-pill"><div class="sp-val t-amber" id="sAg">–</div><div class="sp-lbl">Agendadas</div></div>
  <div class="stat-pill"><div class="sp-val t-blue" id="sLea">–</div><div class="sp-lbl">Leads</div></div>
  <div class="stat-pill"><div class="sp-val" id="sCup">–</div><div class="sp-lbl">Cuponeras</div></div>
</div>

<div class="filter-row">
  <div class="chip a" onclick="setFiltro(this,'todos')">Todos</div>
  <div class="chip" onclick="setFiltro(this,'vip')">⭐ VIP</div>
  <div class="chip" onclick="setFiltro(this,'cuponera')">🎟 Cuponera</div>
  <div class="chip" onclick="setFiltro(this,'riesgo')">⚠️ En riesgo</div>
  <div class="chip" onclick="setFiltro(this,'leads')">🎯 Leads</div>
  <div class="chip" onclick="setFiltro(this,'agendado')">📅 Agendados</div>
</div>

<div class="sort-row">
  <span style="font-size:11px;color:var(--text3);font-weight:500;margin-right:2px">Ordenar:</span>
  <button class="sort-btn a" id="sortScore" onclick="setSort('score')">Relevancia</button>
  <button class="sort-btn" id="sortReciente" onclick="setSort('reciente')">Reciente</button>
  <button class="sort-btn" id="sortNombre" onclick="setSort('nombre')">A–Z</button>
  <span style="margin-left:auto;font-size:11px;color:var(--text3)" id="cntLbl"></span>
</div>

<div class="clist" id="clist">
  ${Array(5).fill(`<div class="ccard"><div class="ct"><div class="skel" style="width:40px;height:40px;border-radius:13px"></div><div style="flex:1;margin-left:10px"><div class="skel" style="height:14px;width:55%;margin-bottom:7px"></div><div class="skel" style="height:11px;width:38%"></div></div></div></div>`).join('')}
</div>

<nav class="bottom-nav">
  <a class="nav-btn" href="/dashboard"><span class="nav-ico">📊</span><span>Inicio</span><div class="nav-pip"></div></a>
  <a class="nav-btn" href="/agenda"><span class="nav-ico">📅</span><span>Agenda</span><div class="nav-pip"></div></a>
  <a class="nav-btn act" href="/admin"><span class="nav-ico">👥</span><span>Clientes</span><div class="nav-pip"></div></a>
  <a class="nav-btn" href="/finanzas"><span class="nav-ico">💰</span><span>Finanzas</span><div class="nav-pip"></div></a>
</nav>

<div class="overlay" id="mCli" onclick="if(event.target===this)close_()">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-head"><span class="sheet-title" id="mNom">–</span><button class="sheet-close" onclick="close_()">✕</button></div>
    <div id="mBody"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let clientes=[],filtro='todos',sortMode='score';
const PAL=[{bg:'rgba(34,197,94,.1)',c:'#22c55e'},{bg:'rgba(168,85,247,.1)',c:'#c084fc'},{bg:'rgba(245,158,11,.1)',c:'#fbbf24'},{bg:'rgba(59,130,246,.1)',c:'#60a5fa'},{bg:'rgba(239,68,68,.1)',c:'#f87171'},{bg:'rgba(107,114,128,.1)',c:'#9ca3af'}];
function toast(msg,dur=2500){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');clearTimeout(el._t);el._t=setTimeout(()=>el.classList.remove('show'),dur)}
function pal(s){let h=0;for(const c of(s||''))h=(h*31+c.charCodeAt(0))%PAL.length;return PAL[h]}
function ini(s){return(s||'?').split(' ').map(p=>p[0]).join('').toUpperCase().slice(0,2)||'?'}

async function loadClientes(){
  try{const r=await fetch('/api/clientes');const raw=await r.json();clientes=raw.map(enrich);renderStats();renderClientes();}
  catch{document.getElementById('clist').innerHTML='<div class="empty-state"><div class="ico">⚠️</div><p>Error cargando clientes</p></div>'}
}

function enrich(c){
  const dias=c.UltimoContacto?Math.floor((Date.now()-new Date(c.UltimoContacto))/86400000):999;
  const ses=parseInt(c['Ses.Rest.'])||0;
  const score=scoreOf(c,dias,ses);
  return{...c,dias,score,cat:catOf(score,c,dias)};
}
function scoreOf(c,dias,ses){let s=0;if(c.Estado==='vino')s+=3;else if(c.Estado==='agendado')s+=2;else if(c.Estado==='lead')s+=1;if(c.Cuponera==='si')s+=2;if(dias<7)s+=2;else if(dias<30)s+=1;if(ses>0)s+=1;return Math.min(5,Math.round(s/2));}
function catOf(score,c,dias){if(score>=4)return'vip';if(c.Estado==='vino'&&dias>30)return'riesgo';if(c.Estado==='vino')return'vino';if(c.Estado==='agendado')return'agendado';if(c.Estado==='lead'&&score>=3)return'hot';return'lead';}

function renderStats(){
  document.getElementById('sTot').textContent=clientes.length;
  document.getElementById('sVin').textContent=clientes.filter(c=>c.Estado==='vino').length;
  document.getElementById('sAg').textContent=clientes.filter(c=>c.Estado==='agendado').length;
  document.getElementById('sLea').textContent=clientes.filter(c=>c.Estado==='lead').length;
  document.getElementById('sCup').textContent=clientes.filter(c=>c.Cuponera==='si').length;
}

function renderClientes(){
  const q=document.getElementById('searchInput').value.toLowerCase();
  let list=[...clientes];
  if(q)list=list.filter(c=>(c.Nombre||'').toLowerCase().includes(q)||(c.Teléfono||'').includes(q));
  if(filtro==='vip')list=list.filter(c=>c.score>=4);
  else if(filtro==='cuponera')list=list.filter(c=>c.Cuponera==='si');
  else if(filtro==='riesgo')list=list.filter(c=>c.cat==='riesgo');
  else if(filtro==='leads')list=list.filter(c=>c.Estado==='lead');
  else if(filtro==='agendado')list=list.filter(c=>c.Estado==='agendado');
  if(sortMode==='score')list.sort((a,b)=>b.score-a.score);
  else if(sortMode==='reciente')list.sort((a,b)=>new Date(b.UltimoContacto||0)-new Date(a.UltimoContacto||0));
  else if(sortMode==='nombre')list.sort((a,b)=>(a.Nombre||'').localeCompare(b.Nombre||''));
  document.getElementById('cntLbl').textContent=list.length+' cliente'+(list.length!==1?'s':'');
  if(!list.length){document.getElementById('clist').innerHTML='<div class="empty-state"><div class="ico">🔍</div><p>Sin resultados</p></div>';return;}
  document.getElementById('clist').innerHTML=list.map((c,i)=>{
    const p=pal(c.Nombre||c.ID);const av=ini(c.Nombre);
    const id=(c.ID||c.Teléfono||'').replace(/'/g,"\\'");
    const sub=[c.Servicio,c.Canal].filter(Boolean).join(' · ')||'–';
    const sesLabel=c.Cuponera==='si'?` · 🎟${c['Ses.Rest.']}`:''
    const warn=c.dias>30&&c.Estado==='vino';
    return`<div class="ccard ${c.cat||''}" style="animation-delay:${Math.min(i*.03,.3)}s" onclick="openCli('${id}')">
<div class="ct">
  <div class="cav" style="background:${p.bg};color:${p.c}">${av}</div>
  <div class="ci"><div class="cn">${c.Nombre||id||'–'}</div><div class="cs">${sub}${sesLabel}</div></div>
  <div class="cr"><span class="dias-badge${warn?' warn':''}">${c.dias<999?c.dias+'d':'–'}</span></div>
</div></div>`;
  }).join('');
}

function openCli(id){
  const c=clientes.find(x=>(x.ID||x.Teléfono||'')===(id));if(!c)return;
  const p=pal(c.Nombre||id);const av=ini(c.Nombre);
  const eid=id.replace(/'/g,"\\'");const nom=(c.Nombre||'').replace(/'/g,"\\'");
  document.getElementById('mNom').textContent=c.Nombre||id;
  document.getElementById('mBody').innerHTML=`
<div style="text-align:center;padding:4px 20px 0">
  <div class="det-av" style="background:${p.bg};color:${p.c}">${av}</div>
  <div style="font-size:11px;color:var(--text3)">${c.Teléfono||''}</div>
</div>
<div style="padding:0 20px">
${[['Estado',c.Estado||'–'],['Canal',c.Canal||'–'],['Servicio',c.Servicio||'–'],['Cuponera',c.Cuponera==='si'?'✅ '+c['Ses.Rest.']+' sesiones':'No'],['Último contacto',c.UltimoContacto?new Date(c.UltimoContacto).toLocaleDateString('es-UY'):'–']].map(([k,v])=>`<div class="data-row"><span class="data-key">${k}</span><span class="data-val">${v}</span></div>`).join('')}
${c.Notas?`<div class="data-row"><span class="data-key">Notas</span><span class="data-val" style="font-size:12px">${c.Notas.slice(0,120)}</span></div>`:''}
</div>
<div class="status-opts">
${['lead','agendado','vino','no_vino','cancelado'].map(s=>`<div class="s-opt${c.Estado===s?' sel':''}" onclick="cambiarEstado('${eid}','${s}',this)">${{lead:'🎯 Lead',agendado:'📅 Agendado',vino:'✅ Vino',no_vino:'❌ No vino',cancelado:'🚫 Cancelado'}[s]}</div>`).join('')}
</div>
<div class="det-actions">
  <button class="det-btn det-wa" onclick="sendWA('${eid}','${nom}')">📱 WhatsApp</button>
  <button class="det-btn det-nota" onclick="addNota('${eid}')">📝 Nota</button>
  <button class="det-btn det-full" onclick="marcarVino('${eid}','${nom}')">✅ Marcar asistencia</button>
  <a href="/cliente?id=${encodeURIComponent(id)}" class="det-btn det-nota" style="text-decoration:none;grid-column:1/-1;text-align:center">👤 Perfil completo →</a>
</div>`;
  document.getElementById('mCli').classList.add('open');
}

async function cambiarEstado(id,estado,el){
  document.querySelectorAll('.s-opt').forEach(x=>x.classList.remove('sel'));el.classList.add('sel');
  await fetch(`/api/clientes/${encodeURIComponent(id)}/estado`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({estado})});
  const c=clientes.find(x=>(x.ID||x.Teléfono||'')===(id));if(c)c.Estado=estado;
  toast('✅ Estado actualizado');
}

async function marcarVino(id,nom){
  await fetch(`/api/clientes/${encodeURIComponent(id)}/asistencia`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({vino:true})});
  toast(`✅ ${nom} marcada como asistida`);close_();loadClientes();
}

async function sendWA(id,nom){
  const msg=prompt(`Mensaje para ${nom}:`);if(!msg)return;
  const r=await fetch(`/api/clientes/${encodeURIComponent(id)}/whatsapp`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({texto:msg})});
  toast(r.ok?'✅ Enviado':'❌ Error');
}

async function addNota(id){
  const n=prompt('Nota:');if(!n)return;
  await fetch(`/api/clientes/${encodeURIComponent(id)}/nota`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({nota:n})});
  toast('📝 Nota guardada');
}

function setFiltro(el,f){document.querySelectorAll('.chip').forEach(x=>x.classList.remove('a'));el.classList.add('a');filtro=f;renderClientes();}
function setSort(s){sortMode=s;document.querySelectorAll('.sort-btn').forEach(x=>x.classList.remove('a'));document.getElementById('sort'+s.charAt(0).toUpperCase()+s.slice(1))?.classList.add('a');renderClientes();}
function close_(){document.getElementById('mCli').classList.remove('open')}

function exportarCSV(){
  const csv=['Nombre,Teléfono,Canal,Servicio,Estado,Cuponera'].concat(clientes.map(c=>[c.Nombre,c.Teléfono,c.Canal,c.Servicio,c.Estado,c.Cuponera].map(v=>`"${(v||'').replace(/"/g,'""')}"`).join(','))).join('\n');
  const a=document.createElement('a');a.href='data:text/csv;charset=utf-8,﻿'+encodeURIComponent(csv);
  a.download='citrino-clientes.csv';a.click();toast('📤 CSV descargado');
}

loadClientes();
</script>
</body>
</html>
