<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="theme-color" content="#B5541A"/>
<title>Citrino — Agenda</title>
<link rel="stylesheet" href="/citrino-ui.css"/>
<style>
/* ── TOP BAR ── */
.topbar{background:linear-gradient(135deg,#7C2D12,#B5541A,#C96030);padding:calc(env(safe-area-inset-top,0px)+12px) 16px 0;flex-shrink:0}
.tb-inner{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.tb-title{font-size:16px;font-weight:700;color:#fff;letter-spacing:-.2px}
.tb-right{display:flex;align-items:center;gap:8px}
.tb-btn{background:rgba(255,255,255,.18);border:none;color:#fff;width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;cursor:pointer;transition:.15s}
.tb-btn:active{background:rgba(255,255,255,.3)}

/* ── WEEK STRIP ── */
.week-strip{background:linear-gradient(135deg,#7C2D12,#B5541A,#C96030);padding:0 12px 14px}
.week-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;padding:0 2px}
.week-label{font-size:13px;color:rgba(255,255,255,.85);font-weight:500}
.wk-arrow{background:none;border:none;color:rgba(255,255,255,.8);font-size:22px;cursor:pointer;padding:2px 6px;border-radius:8px;transition:.15s;line-height:1}
.wk-arrow:active{background:rgba(255,255,255,.15)}
.days-row{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.day-cell{display:flex;flex-direction:column;align-items:center;padding:4px 2px;border-radius:11px;cursor:pointer;transition:.15s;position:relative}
.day-cell:active{background:rgba(255,255,255,.12)}
.day-cell.sel{background:rgba(255,255,255,.18)}
.d-name{font-size:10px;color:rgba(255,255,255,.7);font-weight:600;text-transform:uppercase;letter-spacing:.02em}
.d-num{font-size:20px;font-weight:700;color:#fff;line-height:1.15;width:32px;height:32px;display:flex;align-items:center;justify-content:center;border-radius:50%;margin-top:2px;transition:.15s}
.day-cell.hoy .d-num{background:#fff;color:#B5541A;font-weight:800}
.day-cell.sel:not(.hoy) .d-num{background:rgba(255,255,255,.25)}
.d-dot{width:4px;height:4px;border-radius:50%;background:rgba(255,255,255,.6);margin-top:3px;opacity:0}
.d-dot.show{opacity:1}

/* ── TIME GRID ── */
.scroll-content{overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding-bottom:calc(var(--nav) + var(--safe-b) + 20px);flex:1}
.day-label{padding:14px 16px 6px;display:flex;align-items:center;gap:10px;position:sticky;top:0;background:var(--bg);z-index:5;border-bottom:1px solid var(--border)}
.day-label-text{font-size:14px;font-weight:700;color:var(--text)}
.day-label-count{font-size:12px;color:var(--text3);background:var(--surface3);padding:2px 8px;border-radius:20px}

/* The grid */
.time-grid{padding:0 16px}
.time-row{display:flex;gap:8px;min-height:64px;position:relative}
.time-row:last-child{min-height:40px}
.time-col{width:42px;flex-shrink:0;padding-top:0;display:flex;align-items:flex-start;justify-content:flex-end}
.time-txt{font-size:11px;color:var(--text4);font-weight:500;transform:translateY(-6px)}
.slot-col{flex:1;border-top:1px solid var(--border);position:relative;cursor:pointer;transition:.15s;border-radius:0 6px 6px 0;min-height:64px}
.slot-col:hover{background:rgba(181,84,26,.04)}
.slot-col:active{background:rgba(181,84,26,.08)}
.slot-col.last{border-radius:0 6px 6px 0}
.slot-empty-hint{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:11px;color:var(--text4);opacity:0;transition:.2s;white-space:nowrap;pointer-events:none}
.slot-col:hover .slot-empty-hint{opacity:1}
.slot-col.has-event{cursor:default}
.slot-col.has-event:hover{background:transparent}

/* Turno event */
.turno-event{
  background:#fff;border:1.5px solid rgba(181,84,26,.2);
  border-left:4px solid var(--terra);border-radius:10px;
  padding:9px 11px;margin:2px 0;
  box-shadow:0 2px 8px rgba(100,60,20,.08);
  cursor:pointer;transition:all .18s;
  animation:fadeUp .2s cubic-bezier(.4,0,.2,1);
}
.turno-event:active{transform:scale(.97);box-shadow:0 1px 4px rgba(100,60,20,.06)}
.te-hora{font-size:10px;font-weight:700;color:var(--terra);margin-bottom:3px;letter-spacing:.02em}
.te-nombre{font-size:13px;font-weight:700;color:var(--text);line-height:1.2}
.te-servicio{font-size:11px;color:var(--text3);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.te-chips{display:flex;gap:4px;margin-top:6px;flex-wrap:wrap}
.te-chip{font-size:9px;padding:1px 7px;border-radius:20px;font-weight:700}
.te-chip-ter{background:var(--terra-light);color:var(--terra)}
.te-chip-cup{background:var(--sage-light);color:var(--sage)}

/* Quick actions under event */
.te-actions{display:flex;gap:5px;margin-top:8px;padding-top:7px;border-top:1px solid var(--border)}
.te-act{flex:1;padding:6px 0;border:none;border-radius:7px;font-size:10px;font-weight:700;cursor:pointer;transition:.12s}
.te-act:active{transform:scale(.93)}
.te-act-vino{background:var(--sage-light);color:var(--sage)}
.te-act-no{background:var(--red-light);color:var(--red)}
.te-act-wa{background:var(--surface3);color:var(--text2)}

/* Empty state */
.no-eventos{text-align:center;padding:40px 24px}
.no-ev-ico{font-size:40px;opacity:.3;margin-bottom:10px}
.no-ev-txt{font-size:14px;color:var(--text3);line-height:1.5}

/* PIN screen */
#pinScreen{display:none;position:fixed;inset:0;background:linear-gradient(135deg,#7C2D12,#B5541A,#C96030);z-index:999;flex-direction:column;align-items:center;justify-content:center;gap:20px}
.pin-logo{text-align:center;color:#fff}
.pin-logo .p-ico{font-size:44px;margin-bottom:8px}
.pin-logo h2{font-size:20px;font-weight:800;margin-bottom:3px}
.pin-logo p{font-size:13px;opacity:.75}
.pin-card{background:rgba(255,255,255,.14);backdrop-filter:blur(16px);border-radius:22px;padding:22px;width:272px}
.pin-dots{display:flex;justify-content:center;gap:12px;margin-bottom:18px}
.pin-dot{width:13px;height:13px;border-radius:50%;background:rgba(255,255,255,.3);transition:.2s}
.pin-dot.filled{background:#fff}
.pin-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:7px}
.pk{padding:15px;border:none;border-radius:13px;font-size:20px;font-weight:700;cursor:pointer;transition:.15s;background:rgba(255,255,255,.16);color:#fff}
.pk:active{background:rgba(255,255,255,.3);transform:scale(.93)}
.pk.clr{background:rgba(239,68,68,.3)}
.pk.del{background:rgba(255,255,255,.08)}
.pin-err{color:rgba(255,200,180,1);font-size:12px;text-align:center;margin-top:6px;height:18px}
.pin-admin{background:none;border:none;color:rgba(255,255,255,.6);font-size:12px;cursor:pointer;text-decoration:underline}

/* Modal nuevo turno */
.modal-over{position:fixed;inset:0;background:rgba(28,16,7,.5);z-index:300;display:flex;align-items:flex-end;opacity:0;pointer-events:none;transition:opacity .22s;backdrop-filter:blur(3px)}
.modal-over.open{opacity:1;pointer-events:all}
.modal-sheet{background:var(--surface);border-radius:22px 22px 0 0;padding:0 0 calc(env(safe-area-inset-bottom,0px)+20px);width:100%;max-height:92vh;overflow-y:auto;transform:translateY(100%);transition:transform .3s cubic-bezier(.4,0,.2,1);box-shadow:0 -4px 30px rgba(100,60,20,.12)}
.modal-over.open .modal-sheet{transform:translateY(0)}
.m-handle{width:34px;height:4px;background:var(--border2);border-radius:2px;margin:12px auto 0}
.m-head{display:flex;align-items:center;justify-content:space-between;padding:14px 20px 10px}
.m-title{font-size:17px;font-weight:700;color:var(--text)}
.m-close{width:28px;height:28px;border-radius:50%;border:1px solid var(--border);background:var(--surface2);color:var(--text3);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.15s}
.m-close:active{transform:scale(.85)}
.m-body{padding:0 20px 8px}

/* Toast */
.toast{position:fixed;bottom:calc(var(--nav) + var(--safe-b) + 12px);left:50%;transform:translateX(-50%) translateY(8px);background:var(--text);color:#FAF7F3;padding:10px 18px;border-radius:20px;font-size:13px;font-weight:500;white-space:nowrap;opacity:0;transition:all .25s;z-index:500;pointer-events:none;box-shadow:0 4px 20px rgba(100,60,20,.25)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* bottom nav */
.bnav{position:fixed;bottom:0;left:0;right:0;z-index:100;height:calc(var(--nav) + var(--safe-b));background:rgba(250,247,243,.94);backdrop-filter:blur(20px) saturate(160%);border-top:1px solid var(--border);display:flex;align-items:flex-start;padding-top:8px}
.bnt{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;background:none;border:none;color:var(--text3);font-size:10px;font-weight:500;padding:2px 0;transition:color .2s;text-decoration:none}
.bnt.a{color:var(--terra)}
.bnt-ico{font-size:22px;line-height:1;transition:transform .25s cubic-bezier(.34,1.56,.64,1)}
.bnt.a .bnt-ico{transform:scale(1.1)}

/* Drawer */
.drawer-overlay{position:fixed;inset:0;background:rgba(28,16,7,.4);z-index:200;opacity:0;pointer-events:none;transition:opacity .22s}
.drawer-overlay.open{opacity:1;pointer-events:all}
.drawer{position:fixed;top:0;left:0;bottom:0;width:260px;background:var(--bg);z-index:201;transform:translateX(-100%);transition:transform .28s cubic-bezier(.4,0,.2,1);overflow-y:auto;padding-top:env(safe-area-inset-top,0px);box-shadow:4px 0 30px rgba(100,60,20,.12)}
.drawer.open{transform:translateX(0)}
.dw-head{background:linear-gradient(135deg,#7C2D12,#B5541A);padding:20px 18px 16px;color:#fff}
.dw-logo{font-size:20px;font-weight:800;letter-spacing:-.4px}
.dw-sub{font-size:11px;opacity:.75;margin-top:2px}
.dw-item{display:flex;align-items:center;gap:13px;padding:12px 18px;font-size:13px;font-weight:500;color:var(--text);cursor:pointer;text-decoration:none;transition:.12s;border-bottom:1px solid var(--border)}
.dw-item.act{color:var(--terra);font-weight:700;background:var(--terra-light)}
.dw-item:active{background:var(--surface2)}
.dw-ico{font-size:18px;width:24px;text-align:center}
.dw-sep{height:6px;background:var(--surface3);border-top:1px solid var(--border);border-bottom:1px solid var(--border)}
.dw-sec{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.07em;padding:10px 18px 4px}
</style>
</head>
<body style="display:flex;flex-direction:column;height:100vh;overflow:hidden">

<!-- PIN -->
<div id="pinScreen">
  <div class="pin-logo"><div class="p-ico">🌿</div><h2>Citrino</h2><p>Ingresá tu código</p></div>
  <div class="pin-card">
    <div class="pin-dots" id="pinDots"><div class="pin-dot"></div><div class="pin-dot"></div><div class="pin-dot"></div><div class="pin-dot"></div></div>
    <div class="pin-grid">
      <button class="pk" onclick="pk(1)">1</button><button class="pk" onclick="pk(2)">2</button><button class="pk" onclick="pk(3)">3</button>
      <button class="pk" onclick="pk(4)">4</button><button class="pk" onclick="pk(5)">5</button><button class="pk" onclick="pk(6)">6</button>
      <button class="pk" onclick="pk(7)">7</button><button class="pk" onclick="pk(8)">8</button><button class="pk" onclick="pk(9)">9</button>
      <button class="pk clr" onclick="pk('C')">✕</button><button class="pk" onclick="pk(0)">0</button><button class="pk del" onclick="pk('B')">⌫</button>
    </div>
    <div class="pin-err" id="pinErr"></div>
  </div>
  <button class="pin-admin" onclick="skipPin()">Entrar como admin →</button>
</div>

<!-- TOPBAR -->
<div class="topbar">
  <div class="tb-inner">
    <div style="display:flex;align-items:center;gap:10px">
      <button class="tb-btn" onclick="openDrawer()">☰</button>
      <span class="tb-title" id="tbTitle">Agenda</span>
    </div>
    <div class="tb-right">
      <button class="tb-btn" onclick="irHoy()">📍</button>
    </div>
  </div>
  <div class="week-strip">
    <div class="week-nav">
      <button class="wk-arrow" onclick="semAnt()">‹</button>
      <span class="week-label" id="wkLabel">—</span>
      <button class="wk-arrow" onclick="semSig()">›</button>
    </div>
    <div class="days-row" id="daysRow"></div>
  </div>
</div>

<!-- CONTENT con scroll -->
<div class="scroll-content" id="scrollContent">
  <div id="dayLabel" class="day-label" style="display:none">
    <span class="day-label-text" id="dayLabelText">—</span>
    <span class="day-label-count" id="dayLabelCount"></span>
  </div>
  <div class="time-grid" id="timeGrid"></div>
</div>

<!-- FAB -->
<button class="fab" onclick="openNuevo()" style="position:fixed;bottom:calc(var(--nav) + var(--safe-b) + 16px);right:16px;z-index:50">＋</button>

<!-- BOTTOM NAV -->
<nav class="bnav">
  <a class="bnt" href="/dashboard"><span class="bnt-ico">📊</span><span>Inicio</span></a>
  <a class="bnt a" href="/agenda"><span class="bnt-ico">📅</span><span>Agenda</span></a>
  <a class="bnt" href="/admin"><span class="bnt-ico">👥</span><span>Clientes</span></a>
  <a class="bnt" href="/finanzas"><span class="bnt-ico">💰</span><span>Finanzas</span></a>
</nav>

<!-- DRAWER -->
<div class="drawer-overlay" id="drawerOverlay" onclick="closeDrawer()"></div>
<div class="drawer" id="drawer">
  <div class="dw-head"><div class="dw-logo">🌿 Citrino</div><div class="dw-sub">Centro de bienestar</div></div>
  <a class="dw-item" href="/dashboard"><span class="dw-ico">📊</span>Inicio</a>
  <a class="dw-item act" href="/agenda"><span class="dw-ico">📅</span>Agenda</a>
  <a class="dw-item" href="/admin"><span class="dw-ico">👥</span>Clientes</a>
  <a class="dw-item" href="/finanzas"><span class="dw-ico">💰</span>Finanzas</a>
  <div class="dw-sep"></div>
  <div class="dw-sec">Terapeutas visibles</div>
  <div id="dwTer" style="padding:0 10px 10px"></div>
</div>

<!-- MODAL NUEVO TURNO -->
<div class="modal-over" id="modalNuevo">
  <div class="modal-sheet">
    <div class="m-handle"></div>
    <div class="m-head"><span class="m-title">Nuevo turno</span><button class="m-close" onclick="closeModal('modalNuevo')">✕</button></div>
    <div class="m-body">
      <div class="field"><label class="field-label">Cliente</label><input class="input" id="nNom" placeholder="Nombre" autocomplete="off"/></div>
      <div class="field"><label class="field-label">Teléfono</label><input class="input" id="nTel" type="tel" placeholder="+598 9x xxx xxxx"/></div>
      <div class="field"><label class="field-label">Servicio</label>
        <select class="select" id="nSer">
          <option>Método Citrino</option><option>Drenaje Linfático</option>
          <option>Masaje Descontracturante</option><option>Masaje Relax</option>
          <option>Masaje Modelador</option><option>Masaje Piedras Calientes</option>
          <option>Reflexología</option><option>Reiki</option>
          <option>Limpieza de Cutis</option><option>Manicuría</option><option>Cuponera</option>
        </select>
      </div>
      <div class="field"><label class="field-label">Terapeuta</label><select class="select" id="nTer"><option value="">Cualquiera</option></select></div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
        <div class="field"><label class="field-label">Fecha</label><input class="input" id="nFec" type="date"/></div>
        <div class="field"><label class="field-label">Hora</label><input class="input" id="nHor" type="time" value="09:00"/></div>
      </div>
      <button class="btn btn-primary btn-full" style="margin-top:6px" onclick="crearTurno()">✅ Confirmar turno</button>
      <button class="btn btn-ghost btn-full" style="margin-top:8px" onclick="closeModal('modalNuevo')">Cancelar</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── Estado ──
let semOffset=0, diaSelec=new Date(), terapeutas=[], filtroTer=[], eventos=[], terpPin=null;
const HORA_INICIO=8, HORA_FIN=19;

function toast(msg,dur=2500){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');clearTimeout(el._t);el._t=setTimeout(()=>el.classList.remove('show'),dur)}

// ── INIT ──
async function init(){
  await cargarTerapeutas();
  renderSemana();
  await cargarEventos();
  renderDia();
  initPIN();
}

// ── TERAPEUTAS ──
async function cargarTerapeutas(){
  try{const r=await fetch('/api/terapeutas');terapeutas=await r.json();}
  catch{terapeutas=[{id:'default',nombre:'Citrino',color:'#B5541A'}];}
  renderDrawerTer();
  const sel=document.getElementById('nTer');
  sel.innerHTML='<option value="">Cualquiera</option>'+terapeutas.map(t=>`<option value="${t.id}">${t.nombre}</option>`).join('');
}

function renderDrawerTer(){
  document.getElementById('dwTer').innerHTML=terapeutas.map(t=>`
<div style="display:flex;align-items:center;gap:8px;padding:8px 8px;border-radius:10px;cursor:pointer;transition:.12s;${filtroTer.length&&!filtroTer.includes(t.id)?'opacity:.4':''}" onclick="toggleTer('${t.id}')">
  <div style="width:10px;height:10px;border-radius:50%;background:${t.color||'#B5541A'}"></div>
  <span style="font-size:13px;font-weight:600;color:var(--text)">${t.nombre}</span>
</div>`).join('');
}

function toggleTer(id){if(filtroTer.includes(id))filtroTer=filtroTer.filter(x=>x!==id);else filtroTer.push(id);if(filtroTer.length===terapeutas.length)filtroTer=[];renderDrawerTer();renderDia();}

// ── SEMANA STRIP ──
function renderSemana(){
  const hoy=new Date();
  const lun=getLunes(hoy,semOffset);
  const dom=new Date(lun);dom.setDate(lun.getDate()+6);
  const dias=['Lu','Ma','Mi','Ju','Vi','Sá','Do'];
  document.getElementById('wkLabel').textContent=
    lun.toLocaleDateString('es-UY',{day:'numeric',month:'short'})+' – '+dom.toLocaleDateString('es-UY',{day:'numeric',month:'short',year:'numeric'});
  const row=document.getElementById('daysRow');row.innerHTML='';
  for(let i=0;i<7;i++){
    const d=new Date(lun);d.setDate(lun.getDate()+i);
    const esHoy=mismoDia(d,hoy),esSel=mismoDia(d,diaSelec);
    const cell=document.createElement('div');
    cell.className='day-cell'+(esHoy?' hoy':'')+(esSel?' sel':'');
    cell.innerHTML=`<span class="d-name">${dias[i]}</span><span class="d-num">${d.getDate()}</span><span class="d-dot" id="dt${d.toDateString()}"></span>`;
    cell.onclick=()=>selDia(d);
    row.appendChild(cell);
  }
  actualizarTbTitle();
}

function actualizarTbTitle(){
  const s=diaSelec.toLocaleDateString('es-UY',{weekday:'long',day:'numeric',month:'long'});
  document.getElementById('tbTitle').textContent=s.charAt(0).toUpperCase()+s.slice(1);
}

function selDia(d){
  diaSelec=new Date(d);
  const lun=getLunes(new Date(),semOffset);const dom=new Date(lun);dom.setDate(lun.getDate()+6);
  if(d<lun||d>dom)semOffset=Math.round((getLunes(d,0)-getLunes(new Date(),0))/(7*86400000));
  renderSemana();renderDia();
}

function semAnt(){semOffset--;diaSelec=getLunes(new Date(),semOffset);renderSemana();cargarEventos().then(renderDia);}
function semSig(){semOffset++;diaSelec=getLunes(new Date(),semOffset);renderSemana();cargarEventos().then(renderDia);}
function irHoy(){semOffset=0;diaSelec=new Date();renderSemana();cargarEventos().then(renderDia);}

// ── EVENTOS ──
async function cargarEventos(){
  const lun=getLunes(new Date(),semOffset);
  const dom=new Date(lun);dom.setDate(lun.getDate()+6);dom.setHours(23,59,59);
  try{const r=await fetch(`/api/agenda/eventos?desde=${lun.toISOString()}&hasta=${dom.toISOString()}`);eventos=await r.json();}
  catch{eventos=[];}
  // Marcar dots
  document.querySelectorAll('.d-dot').forEach(d=>d.classList.remove('show'));
  eventos.forEach(ev=>{const d=new Date(ev.inicio);const el=document.getElementById('dt'+d.toDateString());if(el)el.classList.add('show');});
}

// ── RENDER DIA CON GRID DE HORAS ──
function renderDia(){
  const evDia=eventos.filter(ev=>{
    const d=new Date(ev.inicio);if(!mismoDia(d,diaSelec))return false;
    if(!filtroTer.length)return true;
    return filtroTer.some(tid=>{const t=terapeutas.find(x=>x.id===tid);return t&&ev.titulo?.toLowerCase().includes(t.nombre.toLowerCase());});
  }).sort((a,b)=>new Date(a.inicio)-new Date(b.inicio));

  // Label
  const dlbl=document.getElementById('dayLabel');dlbl.style.display='flex';
  document.getElementById('dayLabelText').textContent=diaSelec.toLocaleDateString('es-UY',{weekday:'long',day:'numeric',month:'long'}).replace(/^\w/,c=>c.toUpperCase());
  document.getElementById('dayLabelCount').textContent=evDia.length?evDia.length+' turno'+(evDia.length!==1?'s':''):'Sin turnos';

  // Grid de horas
  const grid=document.getElementById('timeGrid');
  grid.innerHTML='';

  for(let h=HORA_INICIO;h<=HORA_FIN;h++){
    const row=document.createElement('div');row.className='time-row';

    // Columna de hora
    const timeCol=document.createElement('div');timeCol.className='time-col';
    timeCol.innerHTML=`<span class="time-txt">${String(h).padStart(2,'0')}:00</span>`;
    row.appendChild(timeCol);

    // Slot clickeable
    const slotCol=document.createElement('div');slotCol.className='slot-col';

    // Buscar evento en esta hora
    const evEstaHora=evDia.filter(ev=>{
      const ini=new Date(ev.inicio);const fin=new Date(ev.fin);
      const slotIni=new Date(diaSelec);slotIni.setHours(h,0,0,0);
      const slotFin=new Date(diaSelec);slotFin.setHours(h+1,0,0,0);
      return ini<slotFin&&fin>slotIni;
    });

    if(evEstaHora.length){
      slotCol.classList.add('has-event');
      evEstaHora.forEach(ev=>{
        const ini=new Date(ev.inicio);const fin=new Date(ev.fin);
        const hIni=ini.toLocaleTimeString('es-UY',{hour:'2-digit',minute:'2-digit',timeZone:'America/Montevideo'});
        const hFin=fin.toLocaleTimeString('es-UY',{hour:'2-digit',minute:'2-digit',timeZone:'America/Montevideo'});
        const nom=ev.clienteNombre||ev.titulo?.split('—')[0]?.trim()||'–';
        const ser=ev.clienteServicio||ev.titulo?.split('—')[1]?.trim()||'';
        const ter=terapeutas.find(t=>ev.titulo?.includes(t.nombre));
        const color=ter?.color||'#B5541A';
        const card=document.createElement('div');
        card.className='turno-event';
        card.style.borderLeftColor=color;
        card.innerHTML=`
<div class="te-hora">${hIni} – ${hFin}</div>
<div class="te-nombre">${nom}</div>
${ser?`<div class="te-servicio">💆 ${ser}</div>`:''}
<div class="te-chips">
  ${ter?`<span class="te-chip te-chip-ter" style="background:${color}18;color:${color}">${ter.nombre}</span>`:''}
  ${ev.clienteTelefono?'':''}
</div>
<div class="te-actions">
  <button class="te-act te-act-vino" onclick="event.stopPropagation();marcarVino('${ev.id}','${ev.clienteTelefono||''}','${nom.replace(/'/g,"\\'")}')">✅</button>
  <button class="te-act te-act-no" onclick="event.stopPropagation();marcarNoVino('${ev.id}','${(ev.clienteTelefono||'').replace(/'/g,"\\'")}','${nom.replace(/'/g,"\\'")}')">❌</button>
  ${ev.clienteTelefono?`<button class="te-act te-act-wa" onclick="event.stopPropagation();abrirWA('${ev.clienteTelefono}')">📱</button>`:''}
</div>`;
        slotCol.appendChild(card);
      });
    } else if(h<HORA_FIN){
      // Slot vacío — clickeable para crear turno
      slotCol.innerHTML=`<span class="slot-empty-hint">+ Agregar ${String(h).padStart(2,'0')}:00</span>`;
      slotCol.onclick=()=>{
        document.getElementById('nFec').value=diaSelec.toISOString().split('T')[0];
        document.getElementById('nHor').value=String(h).padStart(2,'0')+':00';
        document.getElementById('modalNuevo').classList.add('open');
      };
    }

    row.appendChild(slotCol);
    grid.appendChild(row);
  }
}

// ── ACCIONES ──
async function marcarVino(id,tel,nom){
  if(tel)await fetch(`/api/clientes/${encodeURIComponent(tel)}/asistencia`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({vino:true,eventId:id})}).catch(()=>{});
  toast(`✅ ${nom} asistió`);await cargarEventos();renderDia();
}
async function marcarNoVino(id,tel,nom){
  if(tel)await fetch(`/api/clientes/${encodeURIComponent(tel)}/asistencia`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({vino:false,eventId:id})}).catch(()=>{});
  toast(`❌ ${nom} — no vino`);await cargarEventos();renderDia();
}
function abrirWA(tel){const n=tel.replace(/\D/g,'');window.open(`https://wa.me/${n}`,'_blank');}

// ── NUEVO TURNO ──
function openNuevo(){
  document.getElementById('nFec').value=diaSelec.toISOString().split('T')[0];
  document.getElementById('nNom').value='';document.getElementById('nTel').value='';
  document.getElementById('modalNuevo').classList.add('open');
}

async function crearTurno(){
  const nom=document.getElementById('nNom').value.trim();
  const tel=document.getElementById('nTel').value.trim();
  const ser=document.getElementById('nSer').value;
  const fec=document.getElementById('nFec').value;
  const hor=document.getElementById('nHor').value;
  const terId=document.getElementById('nTer').value;
  if(!nom||!fec||!hor){toast('Completá nombre, fecha y hora');return;}
  try{
    const r=await fetch('/api/agenda/turno',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({nombre:nom,telefono:tel,servicio:ser,fecha:fec,hora:hor,terapeutaId:terId})});
    if(!r.ok)throw new Error();
    toast('📅 Turno confirmado');closeModal('modalNuevo');
    diaSelec=new Date(fec+'T12:00:00');renderSemana();await cargarEventos();renderDia();
  }catch{toast('Error al crear el turno')}
}

// ── DRAWER ──
function openDrawer(){document.getElementById('drawer').classList.add('open');document.getElementById('drawerOverlay').classList.add('open');}
function closeDrawer(){document.getElementById('drawer').classList.remove('open');document.getElementById('drawerOverlay').classList.remove('open');}

// ── MODALES ──
function closeModal(id){document.getElementById(id).classList.remove('open')}
document.querySelectorAll('.modal-over').forEach(m=>m.addEventListener('click',e=>{if(e.target===m)m.classList.remove('open')}));

// ── SWIPE ──
let tx0=0;
document.getElementById('scrollContent').addEventListener('touchstart',e=>{tx0=e.touches[0].clientX},{passive:true});
document.getElementById('scrollContent').addEventListener('touchend',e=>{
  const dx=e.changedTouches[0].clientX-tx0;
  if(Math.abs(dx)>55){const next=new Date(diaSelec);next.setDate(next.getDate()+(dx<0?1:-1));selDia(next);}
},{passive:true});

// ── PIN ──
let pinCur='',terConPin=[];
async function initPIN(){
  terConPin=terapeutas.filter(t=>t.pin);
  if(!terConPin.length)return;
  document.getElementById('pinScreen').style.display='flex';
}
function pk(v){
  if(v==='C'){pinCur='';}else if(v==='B'){pinCur=pinCur.slice(0,-1);}
  else{if(pinCur.length>=4)return;pinCur+=v;}
  document.querySelectorAll('.pin-dot').forEach((d,i)=>d.classList.toggle('filled',i<pinCur.length));
  document.getElementById('pinErr').textContent='';
  if(pinCur.length===4)setTimeout(checkPIN,180);
}
function checkPIN(){
  const t=terConPin.find(x=>x.pin===pinCur);
  if(t){terpPin=t;filtroTer=[t.id];document.getElementById('pinScreen').style.display='none';renderDrawerTer();renderDia();}
  else{document.getElementById('pinErr').textContent='PIN incorrecto';pinCur='';document.querySelectorAll('.pin-dot').forEach(d=>d.classList.remove('filled'));}
}
function skipPin(){document.getElementById('pinScreen').style.display='none';}

// ── UTILS ──
function getLunes(ref,offset=0){const d=new Date(ref);const day=d.getDay();const diff=day===0?-6:1-day;d.setDate(d.getDate()+diff+offset*7);d.setHours(0,0,0,0);return d;}
function mismoDia(a,b){return a.getFullYear()===b.getFullYear()&&a.getMonth()===b.getMonth()&&a.getDate()===b.getDate();}

init();
</script>
